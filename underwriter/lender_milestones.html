<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lender Milestones – Yardstake</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Inline SVG icon components (Lucide-style)
    const _I = ({ size = 24, className, children }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
           className={className}>{children}</svg>
    );
    const ShieldCheck  = p => <_I {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></_I>;
    const MapPin       = p => <_I {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></_I>;
    const Clock        = p => <_I {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></_I>;
    const FileText     = p => <_I {...p}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><line x1="8" x2="16" y1="13" y2="13"/><line x1="8" x2="14" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></_I>;
    const CheckCircle2 = p => <_I {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></_I>;
    const ImageIcon    = p => <_I {...p}><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></_I>;
    const ArrowLeft    = p => <_I {...p}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></_I>;
    const DollarSign   = p => <_I {...p}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></_I>;
    const Maximize2    = p => <_I {...p}><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" x2="14" y1="3" y2="10"/><line x1="3" x2="10" y1="21" y2="14"/></_I>;
    const Lock         = p => <_I {...p}><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></_I>;
    const Download     = p => <_I {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></_I>;
    const Eye          = p => <_I {...p}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></_I>;
    const Info         = p => <_I {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></_I>;

    const App = () => {
  const [isApproved, setIsApproved] = useState(false);
  const [showWaiver, setShowWaiver] = useState(false);

  // Mock data for Project #102 Milestone 2
  const project = {
    id: "102",
    address: "123 Pinecrest Way, San Mateo, CA",
    borrower: "Annie Smith",
    builder: "Backyard Bill",
    loanTotal: 150000,
    disbursed: 2500,
    currentMilestone: {
      title: "Foundation & Utility Stub-out",
      amount: 30000,
      submittedAt: "Feb 25, 2:14 PM",
      gps: "37.5630° N, 122.3255° W",
      photos: [
        "https://images.unsplash.com/photo-1516216628859-9bccecab13ca?auto=format&fit=crop&q=80&w=800",
        "https://images.unsplash.com/photo-1581094794329-c8112a89af12?auto=format&fit=crop&q=80&w=800"
      ]
    }
  };

  const handleApprove = () => {
    setIsApproved(true);
  };

  return (
    <div className="min-h-screen bg-slate-50 font-sans text-slate-900">
      {/* Top Navigation */}
      <nav className="bg-slate-900 text-white p-4 sticky top-0 z-50">
        <div className="max-w-7xl mx-auto flex justify-between items-center px-4">
          <div className="flex items-center space-x-3">
            <span className="text-2xl">🏗️</span>
            <span className="text-xl font-bold tracking-tight">Yard<span className="text-cyan-400">stake</span> <span className="text-slate-500 font-medium">Lender Portal</span></span>
          </div>
          <div className="flex items-center space-x-4">
            <div className="text-right hidden sm:block">
              <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Active Partner</p>
              <p className="text-sm font-bold">Underwriter Ursula</p>
            </div>
            <div className="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center font-bold shadow-lg">U</div>
          </div>
        </div>
      </nav>

      <main className="max-w-6xl mx-auto p-4 md:p-10">
        {/* Breadcrumb & Header */}
        <div className="mb-8">
          <button className="flex items-center text-slate-400 hover:text-slate-600 font-bold text-xs uppercase tracking-widest mb-4 transition-colors">
            <ArrowLeft size={14} className="mr-1" /> Back to Portfolio
          </button>
          <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
              <div className="flex items-center space-x-2 mb-1">
                <span className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[10px] font-black uppercase">Active Loan</span>
                <span className="text-slate-400 font-bold text-xs uppercase">Project #{project.id}</span>
              </div>
              <h1 className="text-3xl font-black text-slate-900 tracking-tight">{project.address}</h1>
              <p className="text-slate-500 font-medium mt-1">Borrower: {project.borrower} • Builder: {project.builder}</p>
            </div>
            <div className="bg-white px-6 py-4 rounded-3xl border border-slate-200 shadow-sm flex items-center space-x-8">
              <div>
                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Loan Total</p>
                <p className="text-xl font-black text-slate-900">${project.loanTotal.toLocaleString()}</p>
              </div>
              <div className="w-px h-10 bg-slate-100"></div>
              <div>
                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Disbursed</p>
                <p className="text-xl font-black text-blue-600">${project.disbursed.toLocaleString()}</p>
              </div>
            </div>
          </div>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
          {/* Left: The Verification Vault */}
          <div className="lg:col-span-2 space-y-6">
            <div className="bg-white rounded-[32px] border border-slate-200 shadow-sm overflow-hidden">
              <div className="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <div className="flex items-center space-x-3">
                  <div className="bg-indigo-600 text-white p-2 rounded-xl">
                    <ShieldCheck size={20} />
                  </div>
                  <h2 className="text-lg font-bold">Draw Verification Vault</h2>
                </div>
                <div className="flex items-center text-xs font-bold text-slate-400">
                  <Clock size={14} className="mr-1" /> Submitted {project.currentMilestone.submittedAt}
                </div>
              </div>

              <div className="p-8 space-y-8">
                {/* Milestone Info */}
                <div className="flex justify-between items-start">
                  <div>
                    <h3 className="text-2xl font-black text-slate-900">{project.currentMilestone.title}</h3>
                    <p className="text-slate-500 mt-1">Milestone 2 of 5 • Ground-work & Foundation</p>
                  </div>
                  <div className="text-right">
                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Disbursement Request</p>
                    <p className="text-3xl font-black text-slate-900">${project.currentMilestone.amount.toLocaleString()}</p>
                  </div>
                </div>

                {/* Evidence Grid */}
                <div className="space-y-4">
                  <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center">
                    <ImageIcon size={14} className="mr-2" /> Geo-Tagged Site Evidence
                  </h4>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {project.currentMilestone.photos.map((photo, i) => (
                      <div key={i} className="relative group rounded-2xl overflow-hidden border border-slate-200 aspect-video">
                        <img src={photo} alt="Evidence" className="w-full h-full object-cover" />
                        <div className="absolute inset-x-0 bottom-0 bg-slate-900/80 backdrop-blur-md p-3 text-[10px] text-white flex justify-between items-center translate-y-full group-hover:translate-y-0 transition-transform">
                          <div className="flex items-center space-x-2">
                            <MapPin size={12} className="text-cyan-400" />
                            <span className="font-mono">{project.currentMilestone.gps}</span>
                          </div>
                          <button className="bg-white/20 hover:bg-white/30 p-1 rounded transition-colors">
                            <Maximize2 size={12} />
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Statutory Lien Waiver Box */}
                <div className="bg-slate-50 rounded-2xl p-6 border border-slate-200 flex items-center justify-between">
                  <div className="flex items-center space-x-4">
                    <div className="bg-green-100 text-green-600 p-3 rounded-xl">
                      <FileText size={24} />
                    </div>
                    <div>
                      <h4 className="font-bold text-slate-900">CA Statutory Lien Waiver</h4>
                      <p className="text-xs text-slate-500 mt-0.5">E-Signed by Backyard Bill • Feb 25, 2:10 PM</p>
                    </div>
                  </div>
                  <div className="flex space-x-2">
                    <button 
                      onClick={() => setShowWaiver(true)}
                      className="bg-white px-4 py-2 border border-slate-200 rounded-lg text-xs font-bold hover:bg-slate-50 transition-colors flex items-center space-x-2"
                    >
                      <Eye size={14} />
                      <span>Review Doc</span>
                    </button>
                    <button className="bg-white p-2 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors">
                      <Download size={14} />
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Right: Adjudication Panel */}
          <div className="space-y-6">
            <div className="bg-slate-900 text-white rounded-[32px] p-8 shadow-2xl border border-slate-800 sticky top-32">
              {!isApproved ? (
                <div className="space-y-6 animate-in fade-in duration-500">
                  <div className="flex items-center space-x-2 mb-2">
                    <Lock size={18} className="text-indigo-400" />
                    <h3 className="text-xl font-bold italic tracking-tight uppercase">Disbursement Gate</h3>
                  </div>
                  <p className="text-slate-400 text-sm leading-relaxed">
                    By clicking disburse, you certify that all digital evidence meets the bank's "Proof of Work" criteria for residential collateral.
                  </p>
                  
                  <div className="py-6 border-y border-slate-800 space-y-4">
                    <div className="flex justify-between text-sm">
                      <span className="text-slate-500 font-medium">Draw Amount:</span>
                      <span className="font-black text-white">${project.currentMilestone.amount.toLocaleString()}</span>
                    </div>
                    <div className="flex justify-between text-sm">
                      <span className="text-slate-500 font-medium">Lien Position:</span>
                      <span className="text-green-400 font-bold uppercase text-[10px] bg-green-400/10 px-2 py-0.5 rounded">Verified</span>
                    </div>
                  </div>

                  <button 
                    onClick={handleApprove}
                    className="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-black text-lg shadow-xl shadow-indigo-900/40 transition-all active:scale-95 flex items-center justify-center space-x-3"
                  >
                    <DollarSign size={20} />
                    <span>Release $30,000</span>
                  </button>

                  <button className="w-full text-slate-500 hover:text-red-400 text-xs font-bold transition-colors">
                    Request Re-inspection
                  </button>
                </div>
              ) : (
                <div className="text-center py-10 space-y-4 animate-in zoom-in duration-300">
                  <div className="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto shadow-lg shadow-green-500/20">
                    <CheckCircle2 size={40} className="text-white" />
                  </div>
                  <h3 className="text-2xl font-black text-white">Funds Disbursed</h3>
                  <p className="text-slate-400 text-sm">
                    $30,000 has been transferred to Yardstake FBO {project.builder}. Your audit trail is now permanent.
                  </p>
                  <div className="text-[10px] font-mono text-slate-600 uppercase tracking-widest mt-4">
                    TXN: 942-DRAW-102-SEC
                  </div>
                </div>
              )}
            </div>

            {/* Compliance Note */}
            <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex items-start space-x-3">
              <Info size={18} className="text-blue-600 mt-1" />
              <p className="text-xs text-slate-500 leading-relaxed">
                <span className="font-bold text-slate-800 block mb-1">Agent of the Payee Protection</span>
                Per the Tri-Party Agreement, this payment legally extinguishes the borrower's debt for Milestone 2. Yardstake maintains MoR liability for the transaction.
              </p>
            </div>
          </div>
        </div>
      </main>

      {/* Mock Waiver Modal */}
      {showWaiver && (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
          <div className="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden animate-in zoom-in duration-200">
             <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                <h4 className="font-bold">E-Signed Statutory Waiver</h4>
                <button onClick={() => setShowWaiver(false)} className="text-slate-400 hover:text-slate-900 font-bold">Close</button>
             </div>
             <div className="p-10 bg-slate-50 text-[11px] text-slate-600 font-serif leading-relaxed h-[400px] overflow-y-auto">
                <h2 className="text-center font-bold text-lg text-slate-900 mb-6 underline">CONDITIONAL WAIVER AND RELEASE ON PROGRESS PAYMENT</h2>
                <p className="mb-4"><strong>NOTICE:</strong> THIS DOCUMENT WAIVES THE CLAIMANT'S LIEN, STOP PAYMENT NOTICE, AND PAYMENT BOND RIGHTS EFFECTIVE ON RECEIPT OF PAYMENT. A PERSON SHOULD NOT RELY ON THIS DOCUMENT UNLESS SATISFIED THAT THE CLAIMANT HAS RECEIVED PAYMENT.</p>
                <div className="space-y-2 mb-6">
                  <p><strong>Name of Claimant:</strong> Backyard Bill Construction</p>
                  <p><strong>Name of Customer:</strong> Annie Smith</p>
                  <p><strong>Job Location:</strong> 123 Pinecrest Way, San Mateo, CA</p>
                  <p><strong>Through Date:</strong> Feb 25, 2026</p>
                </div>
                <p className="mb-4">This document waives and releases lien, stop payment notice, and payment bond rights the claimant has for labor and service provided, and equipment and material delivered, to the customer on this job through the Through Date of this document. This document is effective only on the claimant's receipt of payment from the financial institution on which the following check is drawn:</p>
                <p><strong>Amount of Check:</strong> $30,000.00</p>
                <p><strong>Check Payable to:</strong> Backyard Bill Construction</p>
                <div className="mt-12 pt-8 border-t border-slate-300">
                  <div className="flex justify-between">
                    <div>
                      <p className="italic text-slate-400 mb-1 font-sans">E-Signed via Yardstake Secure Link</p>
                      <p className="font-bold text-slate-900 text-base">Bill Johnson</p>
                      <p className="text-[9px]">ID: YS-SIG-9428-A01-BC</p>
                    </div>
                    <div className="text-right">
                      <p>Dated: Feb 25, 2026</p>
                    </div>
                  </div>
                </div>
             </div>
          </div>
        </div>
      )}
    </div>
  );
};

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
