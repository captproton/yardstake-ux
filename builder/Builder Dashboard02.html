<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manufacturer Dashboard – Yardstake</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const _I = ({ size = 24, className, children }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
           className={className}>{children}</svg>
    );
    const TrendingUp    = p => <_I {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></_I>;
    const MapPin        = p => <_I {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></_I>;
    const DollarSign    = p => <_I {...p}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></_I>;
    const Inbox         = p => <_I {...p}><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></_I>;
    const CheckCircle   = p => <_I {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></_I>;
    const Home          = p => <_I {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></_I>;
    const Zap           = p => <_I {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></_I>;
    const ArrowRight    = p => <_I {...p}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></_I>;
    const CreditCard    = p => <_I {...p}><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></_I>;

    const leads = [
      {
        id: 1,
        name: "Annie K.",
        address: "742 SE Morrison St, Portland",
        confidence: "High",
        score: 87,
        tier: "Hot",
        sqft: 800,
        model: "Skyline Studio 600",
        reportPurchased: true,
        respondedAt: "2h ago",
        tierColor: "bg-red-100 text-red-700",
        dotColor: "bg-red-500",
      },
      {
        id: 2,
        name: "David R.",
        address: "1834 NW Overton St, Portland",
        confidence: "High",
        score: 74,
        tier: "Hot",
        sqft: 750,
        model: "Urban Nest 480",
        reportPurchased: true,
        respondedAt: "Yesterday",
        tierColor: "bg-red-100 text-red-700",
        dotColor: "bg-red-500",
      },
      {
        id: 3,
        name: "Sandra M.",
        address: "556 Ferry St, Eugene",
        confidence: "Medium",
        score: 51,
        tier: "Warm",
        sqft: 600,
        model: "Portland Standard 750",
        reportPurchased: false,
        respondedAt: "3 days ago",
        tierColor: "bg-amber-100 text-amber-700",
        dotColor: "bg-amber-400",
      },
    ];

    const App = () => {
      const [activeTab, setActiveTab] = useState('leads');

      return (
        <div className="min-h-screen bg-slate-900 text-slate-100 font-sans flex flex-col md:flex-row">
          {/* Sidebar */}
          <aside className="w-full md:w-64 bg-slate-950 flex flex-col p-6 space-y-8">
            <div className="flex items-center space-x-3">
              <div className="text-2xl">&#127968;</div>
              <span className="text-xl font-bold tracking-tight">Yard<span className="text-cyan-400">stake</span></span>
            </div>

            <div className="p-4 bg-slate-800 rounded-2xl">
              <p className="text-xs text-slate-400 font-bold uppercase tracking-wide mb-1">Manufacturer</p>
              <p className="font-bold text-white">Cascade ADU Works</p>
              <p className="text-xs text-slate-400 mt-1">Portland · Eugene · Bend</p>
              <div className="mt-3 flex items-center gap-2">
                <div className="w-2 h-2 rounded-full bg-green-400"></div>
                <span className="text-xs text-green-400 font-bold">Stripe Connected</span>
              </div>
            </div>

            <nav className="flex-grow space-y-2">
              {[
                { label: 'Lead Inbox', key: 'leads', icon: Inbox },
                { label: 'My Catalog', key: 'catalog', icon: Home },
                { label: 'Commissions', key: 'commissions', icon: DollarSign },
              ].map(({ label, key, icon: Icon }) => (
                <button
                  key={key}
                  onClick={() => setActiveTab(key)}
                  className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${
                    activeTab === key
                    ? 'bg-cyan-600 text-white'
                    : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                  }`}
                >
                  <Icon size={16} />
                  <span className="text-sm font-semibold">{label}</span>
                </button>
              ))}
            </nav>

            <div className="p-4 bg-slate-800/50 rounded-2xl text-xs text-slate-400 space-y-2">
              <p className="font-bold text-slate-300">Commission Rate</p>
              <p>3% on first 5 sales</p>
              <p className="text-cyan-400 font-bold">Tier 2 (2.5%) unlocks at sale #6</p>
            </div>
          </aside>

          {/* Main */}
          <main className="flex-grow p-6 md:p-10 overflow-y-auto">
            <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
              <div>
                <div className="flex items-center gap-2 text-cyan-400 mb-2">
                  <Inbox size={16} />
                  <span className="text-xs font-black uppercase tracking-widest">Lead Inbox</span>
                </div>
                <h1 className="text-3xl font-black tracking-tight text-white">Qualified Oregon Leads</h1>
                <p className="text-slate-400 text-sm mt-1">Every lead has a Digital Twin-verified parcel. They already know their lot qualifies.</p>
              </div>

              <div className="flex gap-4">
                <div className="bg-slate-800 border border-slate-700 p-4 rounded-2xl text-center min-w-[100px]">
                  <p className="text-2xl font-black text-white">3</p>
                  <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Active Leads</p>
                </div>
                <div className="bg-cyan-600/10 border border-cyan-500/20 p-4 rounded-2xl text-center min-w-[100px]">
                  <p className="text-2xl font-black text-cyan-400">1</p>
                  <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Sales Closed</p>
                </div>
              </div>
            </header>

            {/* Lead List */}
            <div className="space-y-4 mb-12">
              {leads.map((lead) => (
                <div key={lead.id} className="bg-slate-800 rounded-[28px] border border-slate-700 p-6 hover:border-cyan-500/40 transition-all group">
                  <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-6">
                    <div className="flex items-start gap-5">
                      <div className="relative">
                        <div className="w-12 h-12 rounded-2xl bg-slate-700 flex items-center justify-center text-lg font-black text-slate-300">
                          {lead.name.charAt(0)}
                        </div>
                        <div className={`absolute -bottom-1 -right-1 w-3 h-3 rounded-full border-2 border-slate-800 ${lead.dotColor}`}></div>
                      </div>
                      <div>
                        <div className="flex items-center gap-2 mb-1">
                          <span className={`text-[10px] font-black px-2 py-0.5 rounded-full uppercase tracking-tighter ${lead.tierColor}`}>{lead.tier} Lead</span>
                          <span className="text-xs text-slate-500">Score: {lead.score}/100</span>
                        </div>
                        <h3 className="font-bold text-white group-hover:text-cyan-300 transition-colors">{lead.name}</h3>
                        <p className="text-sm text-slate-400 flex items-center gap-1 mt-0.5">
                          <MapPin size={12} /> {lead.address}
                        </p>
                      </div>
                    </div>

                    <div className="flex flex-wrap items-center gap-8 lg:gap-10">
                      <div>
                        <p className="text-[10px] font-bold text-slate-500 uppercase mb-1">Confidence</p>
                        <p className={`font-bold text-sm ${lead.confidence === 'High' ? 'text-green-400' : 'text-amber-400'}`}>{lead.confidence}</p>
                      </div>
                      <div>
                        <p className="text-[10px] font-bold text-slate-500 uppercase mb-1">Buildable</p>
                        <p className="font-bold text-sm text-white">{lead.sqft} sq ft</p>
                      </div>
                      <div>
                        <p className="text-[10px] font-bold text-slate-500 uppercase mb-1">Matched Model</p>
                        <p className="font-bold text-sm text-white">{lead.model}</p>
                      </div>
                      <div>
                        <p className="text-[10px] font-bold text-slate-500 uppercase mb-1">Report</p>
                        <p className={`font-bold text-sm ${lead.reportPurchased ? 'text-green-400' : 'text-slate-500'}`}>
                          {lead.reportPurchased ? 'Purchased' : 'Not purchased'}
                        </p>
                      </div>
                      <button className="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-3 rounded-2xl text-sm font-bold flex items-center gap-2 transition-all active:scale-95 shadow-lg shadow-cyan-900/30">
                        View Lead <ArrowRight size={14} />
                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* Commission Summary */}
            <div className="bg-slate-800 rounded-[28px] border border-slate-700 p-8">
              <div className="flex items-center gap-2 text-slate-400 mb-6">
                <DollarSign size={16} />
                <span className="text-xs font-black uppercase tracking-widest">Commission Summary — March 2026</span>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {[
                  { label: "Completed Sales", value: "1", sub: "This month", icon: CheckCircle, color: "text-green-400" },
                  { label: "Commission Earned", value: "$4,440", sub: "3% on $148,000 sale", icon: DollarSign, color: "text-cyan-400" },
                  { label: "Payout Status", value: "Transferred", sub: "Stripe Express · Mar 5", icon: CreditCard, color: "text-blue-400" },
                ].map((item, i) => (
                  <div key={i} className="bg-slate-900/50 rounded-2xl p-5 flex items-center gap-4">
                    <item.icon size={28} className={item.color} />
                    <div>
                      <p className="text-xl font-black text-white">{item.value}</p>
                      <p className="text-xs font-bold text-slate-400 uppercase tracking-wide">{item.label}</p>
                      <p className="text-[10px] text-slate-500 mt-0.5">{item.sub}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <footer className="text-center py-10 mt-10 border-t border-slate-800">
              <p className="text-slate-600 text-[10px] font-black uppercase tracking-widest">Cascade ADU Works · Yardstake Manufacturer Dashboard · Oregon Beta</p>
            </footer>
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
