<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viral Embeds – Yardstake</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Inline SVG icon components (Lucide-style)
    const _I = ({ size = 24, className, children }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
           className={className}>{children}</svg>
    );
    const Code          = p => <_I {...p}><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></_I>;
    const Copy          = p => <_I {...p}><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></_I>;
    const BarChart3     = p => <_I {...p}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></_I>;
    const CheckCircle2  = p => <_I {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></_I>;
    const MousePointer2 = p => <_I {...p}><path d="m4 4 7.07 17 2.51-7.39L21 11.07z"/></_I>;
    const Maximize2     = p => <_I {...p}><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" x2="14" y1="3" y2="10"/><line x1="3" x2="10" y1="21" y2="14"/></_I>;
    const Share2        = p => <_I {...p}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></_I>;
    const Info          = p => <_I {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></_I>;
    const ChevronRight  = p => <_I {...p}><path d="m9 18 6-6-6-6"/></_I>;
    const DollarSign    = p => <_I {...p}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></_I>;

    const App = () => {
  const [selectedModel, setSelectedModel] = useState('Modern Sanctuary XL');
  const [copied, setCopied] = useState(false);
  const [settings, setSettings] = useState({
    showBackyardDrop: true,
    showFinancingTicker: true,
    autoRotate: true,
    primaryColor: '#2563eb',
    ctaText: 'Start Feasibility Study'
  });

  const models = [
    { name: 'Modern Sanctuary XL', views: 1240, leads: 42, conversion: '3.4%' },
    { name: 'Studio Pod', views: 850, leads: 12, conversion: '1.4%' },
    { name: 'Family Loft', views: 420, leads: 8, conversion: '1.9%' }
  ];

  const embedCode = `<iframe 
  src="https://app.yardstake.io/embed/models/${selectedModel.toLowerCase().replace(/ /g, '-')}" 
  width="100%" 
  height="600px" 
  frameborder="0" 
  loading="lazy"
  data-backyard-drop="${settings.showBackyardDrop}"
  data-cta="${settings.ctaText}"
  class="yardstake-configurator">
</iframe>`;

  const copyToClipboard = () => {
    // In a real environment: navigator.clipboard.writeText(embedCode);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  return (
    <div className="min-h-screen bg-slate-50 flex font-sans text-slate-900">
      {/* Sidebar - Consistent with Builder UI */}
      <aside className="w-64 bg-slate-900 text-white p-6 flex flex-col hidden lg:flex">
        <div className="flex items-center space-x-2 mb-10">
          <span className="text-2xl">🏗️</span>
          <span className="text-xl font-bold tracking-tight text-white">Yard<span className="text-cyan-400">stake</span></span>
        </div>
        <nav className="space-y-2 flex-grow">
          {['Dashboard', 'Catalog', 'Projects', 'Embeds', 'Finance'].map((item) => (
            <div 
              key={item} 
              className={`px-4 py-3 rounded-xl cursor-pointer transition-all flex items-center space-x-3 ${
                item === 'Embeds' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'
              }`}
            >
              <span className="text-sm font-bold">{item}</span>
            </div>
          ))}
        </nav>
        <div className="bg-slate-800 p-4 rounded-2xl">
          <p className="text-[10px] font-black text-slate-500 uppercase mb-2">Support</p>
          <div className="flex items-center space-x-2">
            <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
            <span className="text-xs font-bold">Fixer Fiona Online</span>
          </div>
        </div>
      </aside>

      {/* Main Content */}
      <main className="flex-grow p-4 md:p-10 lg:p-12 overflow-y-auto">
        <header className="flex flex-col md:flex-row md:items-end justify-between mb-10 space-y-4 md:space-y-0">
          <div>
            <h1 className="text-4xl font-extrabold tracking-tight">Viral Embeds</h1>
            <p className="text-slate-500 mt-2">Manage your "Trojan Horse" 3D configurators across your website and partners.</p>
          </div>
          <button className="bg-slate-900 text-white px-6 py-3 rounded-2xl text-sm font-bold flex items-center space-x-2 shadow-lg shadow-slate-200">
            <Share2 size={18} />
            <span>Integrate New Site</span>
          </button>
        </header>

        <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
          
          {/* Left: Model Selector & Stats */}
          <div className="space-y-6">
            <div className="bg-white p-6 rounded-[32px] border border-slate-200 shadow-sm">
              <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Select Model</h3>
              <div className="space-y-3">
                {models.map((m) => (
                  <button 
                    key={m.name}
                    onClick={() => setSelectedModel(m.name)}
                    className={`w-full p-4 rounded-2xl border text-left transition-all ${
                      selectedModel === m.name 
                      ? 'border-blue-600 bg-blue-50 ring-2 ring-blue-100' 
                      : 'border-slate-100 bg-white hover:border-slate-300'
                    }`}
                  >
                    <div className="flex justify-between items-center">
                      <span className="font-bold text-slate-800">{m.name}</span>
                      <ChevronRight size={16} className={selectedModel === m.name ? 'text-blue-600' : 'text-slate-300'} />
                    </div>
                  </button>
                ))}
              </div>
            </div>

            <div className="bg-white p-6 rounded-[32px] border border-slate-200 shadow-sm">
              <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">Embed Analytics</h3>
              <div className="grid grid-cols-2 gap-4">
                <div className="space-y-1">
                  <p className="text-[10px] font-bold text-slate-400 uppercase">Total Views</p>
                  <p className="text-2xl font-black">{models.find(m => m.name === selectedModel).views}</p>
                </div>
                <div className="space-y-1">
                  <p className="text-[10px] font-bold text-slate-400 uppercase">Leads (Retainers)</p>
                  <p className="text-2xl font-black text-blue-600">{models.find(m => m.name === selectedModel).leads}</p>
                </div>
              </div>
              <div className="mt-6 pt-6 border-t border-slate-100">
                <div className="flex justify-between items-center text-sm font-bold">
                  <span className="text-slate-500">Conv. Rate</span>
                  <span className="text-green-600">{models.find(m => m.name === selectedModel).conversion}</span>
                </div>
              </div>
            </div>
          </div>

          {/* Center: Embed Configurator & Snippet */}
          <div className="xl:col-span-2 space-y-8">
            <div className="bg-white rounded-[40px] p-8 md:p-10 border border-slate-200 shadow-sm">
              <div className="flex items-center justify-between mb-8">
                <div className="flex items-center space-x-3">
                  <div className="p-2 bg-blue-600 text-white rounded-lg">
                    <Code size={20} />
                  </div>
                  <h2 className="text-xl font-bold text-slate-900">Embed Configuration</h2>
                </div>
                <div className="flex bg-slate-100 p-1 rounded-xl">
                  <button className="px-4 py-1.5 bg-white rounded-lg shadow-sm text-xs font-bold text-slate-900">Desktop</button>
                  <button className="px-4 py-1.5 text-slate-400 text-xs font-bold">Mobile</button>
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                {/* Settings Form */}
                <div className="space-y-6">
                  <div className="space-y-4">
                    <label className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100 transition-colors">
                      <div className="flex items-center space-x-3">
                        <Maximize2 size={18} className="text-slate-400" />
                        <span className="text-sm font-bold text-slate-800">Backyard Drop (AR)</span>
                      </div>
                      <input 
                        type="checkbox" 
                        checked={settings.showBackyardDrop}
                        onChange={(e) => setSettings({...settings, showBackyardDrop: e.target.checked})}
                        className="w-5 h-5 accent-blue-600 cursor-pointer"
                      />
                    </label>

                    <label className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl cursor-pointer hover:bg-slate-100 transition-colors">
                      <div className="flex items-center space-x-3">
                        <DollarSign size={18} className="text-slate-400" />
                        <span className="text-sm font-bold text-slate-800">Financing Ticker</span>
                      </div>
                      <input 
                        type="checkbox" 
                        checked={settings.showFinancingTicker}
                        onChange={(e) => setSettings({...settings, showFinancingTicker: e.target.checked})}
                        className="w-5 h-5 accent-blue-600 cursor-pointer"
                      />
                    </label>
                  </div>

                  <div className="space-y-2">
                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Call-To-Action Text</label>
                    <input 
                      type="text" 
                      value={settings.ctaText}
                      onChange={(e) => setSettings({...settings, ctaText: e.target.value})}
                      className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-bold focus:ring-2 focus:ring-blue-100 outline-none text-slate-900"
                    />
                  </div>
                </div>

                {/* Preview Mockup */}
                <div className="relative group">
                  <div className="absolute inset-0 bg-slate-900 rounded-3xl overflow-hidden shadow-inner">
                    <div className="h-full bg-[url('https://images.unsplash.com/photo-1518780664697-55e3ad937233?auto=format&fit=crop&q=80&w=800')] bg-cover bg-center opacity-60"></div>
                    <div className="absolute inset-0 flex flex-col items-center justify-center p-6 text-center text-white">
                      <div className="bg-blue-600 px-3 py-1 rounded-full text-[10px] font-black uppercase mb-2 shadow-lg">3D PREVIEW</div>
                      <h4 className="font-black text-lg text-white">{selectedModel}</h4>
                      <div className="mt-4 flex space-x-2">
                        <div className="w-8 h-8 rounded-full bg-white/20 border border-white/40 flex items-center justify-center backdrop-blur-sm"><MousePointer2 size={14} /></div>
                        <div className="w-8 h-8 rounded-full bg-white/20 border border-white/40 flex items-center justify-center backdrop-blur-sm"><Maximize2 size={14} /></div>
                      </div>
                    </div>
                    {/* Floating Math Mockup */}
                    {settings.showFinancingTicker && (
                      <div className="absolute bottom-4 inset-x-4 bg-white/10 backdrop-blur-md border border-white/20 rounded-xl p-3 flex justify-between items-center text-white shadow-xl">
                        <span className="text-[10px] font-bold uppercase tracking-wider">Estimated Monthly</span>
                        <span className="text-sm font-black">$842/mo</span>
                      </div>
                    )}
                  </div>
                </div>
              </div>

              {/* Snippet Area */}
              <div className="mt-10 pt-10 border-t border-slate-100">
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-sm font-bold text-slate-800">HTML Snippet</h3>
                  <div className="flex items-center space-x-2 text-blue-600 text-[10px] font-bold uppercase tracking-wide">
                    <Info size={14} />
                    <span>Paste into your CMS (Webflow/Shopify)</span>
                  </div>
                </div>
                <div className="relative group">
                  <pre className="bg-slate-900 text-slate-300 p-6 rounded-2xl overflow-x-auto text-xs leading-relaxed font-mono border border-slate-800 shadow-2xl">
                    {embedCode}
                  </pre>
                  <button 
                    onClick={copyToClipboard}
                    className="absolute top-4 right-4 p-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-white transition-all active:scale-95 flex items-center space-x-2 text-[10px] font-bold border border-slate-700 shadow-xl"
                  >
                    {copied ? <CheckCircle2 size={14} className="text-green-400" /> : <Copy size={14} />}
                    <span>{copied ? 'Copied!' : 'Copy Code'}</span>
                  </button>
                </div>
              </div>
            </div>

            {/* Help / Strategic Note */}
            <div className="bg-blue-600 rounded-[32px] p-8 text-white flex flex-col md:flex-row items-center justify-between gap-6 shadow-xl shadow-blue-100 relative overflow-hidden">
              <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
              <div className="space-y-2 max-w-lg text-center md:text-left relative z-10">
                <h4 className="text-xl font-bold italic">The "Hero Builder" Advantage</h4>
                <p className="text-blue-100 text-sm leading-relaxed">
                  Since you are a founding partner, your embeds are <strong>White-Labeled</strong>. 
                  All Yardstake branding is minimized, keeping the focus 100% on your factory's brand.
                </p>
              </div>
              <div className="bg-white/20 p-4 rounded-2xl border border-white/20 relative z-10 shadow-lg">
                <BarChart3 size={32} />
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  );
};

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
