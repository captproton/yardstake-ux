<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor SMS Magic Link | Yardstake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0F172A; color: #F8FAFC; }
        /* Simulating a mobile phone frame for the mock */
        .mobile-frame {
            width: 390px;
            height: 844px;
            background: #000;
            border-radius: 40px;
            border: 8px solid #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 25px;
            background: #1e293b;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            z-index: 50;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-6 bg-slate-900 bg-[url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&w=2000&q=80')] bg-cover bg-center bg-fixed bg-no-repeat bg-blend-overlay">

    <div class="flex flex-col items-center">
        
        <div class="text-center mb-8 max-w-md">
            <h2 class="text-2xl font-bold text-white mb-2">Zero-Dashboard SMS Flow (Alt 3)</h2>
            <p class="text-sm text-slate-400">Mike clicks the secure SMS link. It bypasses logging in completely, instantly opening this workflow on his native mobile browser.</p>
        </div>

        <div class="mobile-frame flex flex-col bg-slate-900 relative">
            <div class="notch"></div>
            
            <!-- Faux Top Bar -->
            <div class="h-12 w-full flex justify-between items-end px-6 pb-2 text-[10px] font-bold text-white z-40 relative">
                <span>9:41</span>
                <div class="flex space-x-1">
                    <i data-lucide="signal" class="w-3 h-3"></i>
                    <i data-lucide="wifi" class="w-3 h-3"></i>
                    <i data-lucide="battery-full" class="w-3 h-3"></i>
                </div>
            </div>

            <!-- Faux Camera Viewfinder Background -->
            <div class="absolute inset-0 z-0 bg-[url('https://images.unsplash.com/photo-1541888087401-209fae48eebf?auto=format&fit=crop&w=800&q=80')] bg-cover bg-center">
                <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
            </div>

            <div class="relative z-10 flex-grow flex flex-col justify-between p-6 pt-10">
                
                <div class="bg-black/40 backdrop-blur-md border border-white/10 rounded-2xl p-5 shadow-2xl">
                    <div class="flex items-center space-x-2 text-emerald-400 font-bold mb-1 text-xs uppercase tracking-widest">
                        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> ORD-9021
                    </div>
                    <h1 class="text-2xl font-extrabold text-white leading-tight">Framing Photos Required</h1>
                    <p class="text-xs text-slate-300 mt-2">Yardstake requires 3 GPS-tagged photos of the installed roof trusses for Portland Lot R5.</p>
                </div>

                <div class="space-y-4">
                    <!-- Progress visualizer -->
                    <div class="flex justify-center space-x-2 mb-6" id="progress-bars">
                        <div class="w-12 h-1 bg-white/20 rounded-full transition-all duration-300" id="prog-1"></div>
                        <div class="w-12 h-1 bg-white/20 rounded-full transition-all duration-300" id="prog-2"></div>
                        <div class="w-12 h-1 bg-white/20 rounded-full transition-all duration-300" id="prog-3"></div>
                    </div>

                    <button id="camera-btn" onclick="simulateUpload()" class="w-full bg-slate-800/80 backdrop-blur-xl border border-slate-600 rounded-2xl flex flex-col items-center justify-center py-10 hover:bg-slate-700/80 transition-colors group relative overflow-hidden">
                        <div id="camera-icon-wrapper" class="w-16 h-16 bg-blue-500/20 text-blue-400 border border-blue-500/30 rounded-full flex items-center justify-center mb-3 group-hover:bg-blue-500 group-hover:text-white transition-colors duration-300">
                            <i data-lucide="camera" class="w-8 h-8" id="camera-icon"></i>
                        </div>
                        <span id="camera-title" class="font-bold text-white tracking-wide">Tap to Open Camera</span>
                        <span id="camera-subtitle" class="text-[10px] text-slate-400 mt-1 uppercase tracking-widest">Photo 1 of 3</span>
                    </button>

                    <button id="payout-btn" class="w-full bg-emerald-500 text-white font-black text-lg py-4 rounded-xl shadow-lg shadow-emerald-500/0 flex justify-center items-center opacity-50 cursor-not-allowed transition-all duration-500 scale-95">
                        <i data-lucide="lock" class="w-5 h-5 mr-2 opacity-70" id="payout-icon"></i> <span id="payout-text">Unlock $40k Payout</span>
                    </button>
                    
                    <button id="later-btn" class="w-full text-center text-xs text-slate-400 font-bold mt-2 py-2 transition-opacity duration-300">
                        I'll do this later
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let photosTaken = 0;

        function simulateUpload() {
            const btn = document.getElementById('camera-btn');
            const iconWrapper = document.getElementById('camera-icon-wrapper');
            const icon = document.getElementById('camera-icon');
            const title = document.getElementById('camera-title');
            const subtitle = document.getElementById('camera-subtitle');

            // Prevent spam clicks during animation
            if (btn.classList.contains('pointer-events-none') || photosTaken >= 3) return;

            // Flash effect for taking photo
            btn.classList.add('bg-white', 'pointer-events-none');
            setTimeout(() => btn.classList.remove('bg-white'), 100);

            photosTaken++;
            
            // Update Progress Bar
            const prog = document.getElementById(`prog-${photosTaken}`);
            prog.classList.remove('bg-white/20');
            prog.classList.add('bg-emerald-500', 'shadow-[0_0_8px_rgba(16,185,129,0.8)]');

            if (photosTaken < 3) {
                // Next photo setup
                setTimeout(() => {
                    subtitle.innerText = `Photo ${photosTaken + 1} of 3`;
                    btn.classList.remove('pointer-events-none');
                }, 300);
            } else {
                // Done! Transform the UI
                setTimeout(() => {
                    // Turn camera box into success checkmark
                    iconWrapper.classList.remove('bg-blue-500/20', 'text-blue-400', 'border-blue-500/30', 'group-hover:bg-blue-500');
                    iconWrapper.classList.add('bg-emerald-500/20', 'text-emerald-400', 'border-emerald-500/30');
                    icon.setAttribute('data-lucide', 'check-circle');
                    
                    title.innerText = "GPS Verification Complete";
                    title.classList.add('text-emerald-400');
                    subtitle.innerText = "Coordinates & Timestamps Locked";
                    
                    lucide.createIcons();
                    
                    // Activate Payout Button
                    setTimeout(() => {
                        const payoutBtn = document.getElementById('payout-btn');
                        const payoutIcon = document.getElementById('payout-icon');
                        const payoutText = document.getElementById('payout-text');
                        const laterBtn = document.getElementById('later-btn');

                        payoutBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'scale-95', 'shadow-emerald-500/0');
                        payoutBtn.classList.add('opacity-100', 'cursor-pointer', 'scale-100', 'shadow-emerald-500/50', 'hover:bg-emerald-400');
                        
                        payoutIcon.setAttribute('data-lucide', 'banknote');
                        payoutIcon.classList.remove('opacity-70');
                        payoutText.innerText = 'Transfer $40,000 to Bank';
                        
                        laterBtn.classList.add('opacity-0', 'pointer-events-none');
                        
                        lucide.createIcons();

                        // Add final click event to payout button
                        payoutBtn.onclick = () => {
                            payoutBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Processing...';
                            lucide.createIcons();
                            setTimeout(() => {
                                payoutBtn.innerHTML = '<i data-lucide="check" class="w-5 h-5 mr-2"></i> Sent via Stripe Connect';
                                payoutBtn.classList.remove('bg-emerald-500', 'hover:bg-emerald-400');
                                payoutBtn.classList.add('bg-slate-800', 'text-emerald-400', 'pointer-events-none');
                                lucide.createIcons();
                            }, 1500);
                        };

                    }, 600);
                }, 400);
            }
        }
    </script>
</body>
</html>
