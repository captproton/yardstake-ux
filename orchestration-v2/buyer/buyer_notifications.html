<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — Yardstake</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #0F172A; }
    .glass-card { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226,232,240,0.8); }
    .gradient-text { background: linear-gradient(to right, #2563EB, #06B6D4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .notif-item { transition: background 0.15s ease; }
    .notif-item:hover { background: rgba(248,250,252,0.9); }
    .notif-item.unread { border-left: 3px solid #2563EB; }
    .notif-item.read { border-left: 3px solid transparent; }
    .filter-tab { transition: all 0.15s ease; }
    .filter-tab.active { color: #1D4ED8; border-bottom-color: #2563EB; font-weight: 700; }
    .filter-tab:not(.active) { color: #64748B; border-bottom-color: transparent; }
    #toast { transition: opacity 0.3s ease, transform 0.3s ease; }
  </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-sm font-semibold px-5 py-3 rounded-xl shadow-xl z-[100] opacity-0 pointer-events-none translate-y-2">
    All notifications marked as read ✓
  </div>

  <!-- Authenticated nav -->
  <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-2">
        <i data-lucide="home" class="w-5 h-5 text-blue-600"></i>
        <span class="text-xl font-bold tracking-tight">Yard<span class="text-cyan-500">stake</span></span>
      </div>
      <div class="flex items-center space-x-3">
        <a href="buyer_messages.html" class="flex items-center space-x-2 bg-blue-50 border border-blue-100 px-3 py-1.5 rounded-full hover:bg-blue-100 transition-colors">
          <img src="https://i.pravatar.cc/100?img=32" class="w-5 h-5 rounded-full object-cover" alt="Fiona">
          <span class="text-xs font-bold text-blue-700">Message Fiona</span>
        </a>
        <button class="relative p-2 rounded-full hover:bg-slate-100 transition-colors">
          <i data-lucide="bell" class="w-5 h-5 text-slate-500"></i>
          <span id="bell-badge" class="absolute top-1 right-1 w-2 h-2 bg-orange-500 rounded-full"></span>
        </button>
        <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold">A</div>
      </div>
    </div>
  </nav>

  <!-- Secondary tab bar -->
  <div class="bg-white border-b border-slate-200 sticky top-16 z-40">
    <div class="max-w-7xl mx-auto px-6 flex space-x-8">
      <a href="buyer_project_hub.html" class="py-3 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors whitespace-nowrap">My Project</a>
      <a href="buyer_report.html" class="py-3 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors whitespace-nowrap">My Report</a>
      <a href="buyer_messages.html" class="py-3 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors whitespace-nowrap">Messages</a>
    </div>
  </div>

  <!-- Main -->
  <main class="flex-1 max-w-3xl mx-auto w-full px-4 py-8">

    <!-- Header row -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-slate-900">Notifications</h1>
        <p class="text-sm text-slate-500 mt-0.5">Updates on your project at 742 SE Morrison St</p>
      </div>
      <button onclick="markAllRead()" class="text-xs font-semibold text-blue-600 hover:text-blue-800 transition-colors px-3 py-1.5 rounded-lg hover:bg-blue-50">
        Mark all read
      </button>
    </div>

    <!-- Filter tabs -->
    <div class="flex space-x-6 border-b border-slate-200 mb-6">
      <button onclick="setFilter('all')" id="tab-all" class="filter-tab active pb-3 text-sm border-b-2">
        All <span id="badge-all" class="ml-1 bg-blue-100 text-blue-700 text-xs font-bold px-1.5 py-0.5 rounded-full">5</span>
      </button>
      <button onclick="setFilter('milestone')" id="tab-milestone" class="filter-tab pb-3 text-sm border-b-2">
        Milestones <span id="badge-milestone" class="ml-1 bg-slate-100 text-slate-600 text-xs font-semibold px-1.5 py-0.5 rounded-full">2</span>
      </button>
      <button onclick="setFilter('payment')" id="tab-payment" class="filter-tab pb-3 text-sm border-b-2">
        Payments <span id="badge-payment" class="ml-1 bg-slate-100 text-slate-600 text-xs font-semibold px-1.5 py-0.5 rounded-full">1</span>
      </button>
      <button onclick="setFilter('message')" id="tab-message" class="filter-tab pb-3 text-sm border-b-2">
        Messages <span id="badge-message" class="ml-1 bg-slate-100 text-slate-600 text-xs font-semibold px-1.5 py-0.5 rounded-full">2</span>
      </button>
    </div>

    <!-- Notification list -->
    <div id="notif-list" class="glass-card rounded-2xl overflow-hidden divide-y divide-slate-100">
      <!-- Items injected by JS -->
    </div>

    <!-- Empty state (hidden by default) -->
    <div id="empty-state" class="hidden text-center py-16">
      <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i data-lucide="bell-off" class="w-7 h-7 text-slate-400"></i>
      </div>
      <p class="text-slate-600 font-semibold">No notifications in this category</p>
      <p class="text-slate-400 text-sm mt-1">You're all caught up!</p>
    </div>

  </main>

  <script>
    const NOTIFICATIONS = [
      {
        id: 1,
        type: 'milestone',
        icon: 'check-circle',
        iconColor: 'text-emerald-500',
        iconBg: 'bg-emerald-50',
        title: 'Foundation milestone verified',
        body: 'Fiona confirmed Pacific Foundation Works completed footings to spec. $37,500 has been released from escrow.',
        time: '2 hours ago',
        read: false,
        link: 'buyer_milestone_detail.html',
      },
      {
        id: 2,
        type: 'message',
        icon: 'message-circle',
        iconColor: 'text-blue-500',
        iconBg: 'bg-blue-50',
        title: 'New message from Fiona',
        body: 'Hi Annie! Just a heads-up — Crane Day is confirmed for April 14th at 8 AM. The crew will need access to the side gate…',
        time: '5 hours ago',
        read: false,
        link: 'buyer_messages.html',
      },
      {
        id: 3,
        type: 'payment',
        icon: 'dollar-sign',
        iconColor: 'text-violet-500',
        iconBg: 'bg-violet-50',
        title: 'Payment milestone approaching',
        body: 'The Factory Delivery milestone is scheduled for Apr 14. A payment of $25,000 will be released upon Fiona\'s verification.',
        time: 'Yesterday',
        read: false,
        link: 'buyer_project_hub.html',
      },
      {
        id: 4,
        type: 'milestone',
        icon: 'package',
        iconColor: 'text-cyan-500',
        iconBg: 'bg-cyan-50',
        title: 'Factory build complete',
        body: 'Cascadia Studio confirmed your 480 sq ft unit passed final factory inspection. It\'s heading to your site on April 14.',
        time: '3 days ago',
        read: true,
        link: 'buyer_project_hub.html',
      },
      {
        id: 5,
        type: 'message',
        icon: 'message-circle',
        iconColor: 'text-blue-500',
        iconBg: 'bg-blue-50',
        title: 'Fiona shared factory photos',
        body: 'Your advisor attached 3 photos from the factory floor inspection. Framing, electrical rough-in, and interior finish all visible.',
        time: '4 days ago',
        read: true,
        link: 'buyer_milestone_detail.html',
      },
    ];

    let currentFilter = 'all';
    let notifications = NOTIFICATIONS.map(n => ({ ...n }));

    function setFilter(filter) {
      currentFilter = filter;
      // Update tab styles
      ['all', 'milestone', 'payment', 'message'].forEach(f => {
        const tab = document.getElementById(`tab-${f}`);
        if (f === filter) {
          tab.classList.add('active');
        } else {
          tab.classList.remove('active');
        }
      });
      renderList();
    }

    function renderList() {
      const list = document.getElementById('notif-list');
      const empty = document.getElementById('empty-state');

      const filtered = currentFilter === 'all'
        ? notifications
        : notifications.filter(n => n.type === currentFilter);

      if (filtered.length === 0) {
        list.classList.add('hidden');
        empty.classList.remove('hidden');
        lucide.createIcons();
        return;
      }

      list.classList.remove('hidden');
      empty.classList.add('hidden');

      list.innerHTML = filtered.map(n => `
        <div class="notif-item ${n.read ? 'read' : 'unread'} px-5 py-4 flex items-start space-x-4 cursor-pointer" onclick="markRead(${n.id})">
          <div class="flex-shrink-0 w-10 h-10 rounded-full ${n.iconBg} flex items-center justify-center mt-0.5">
            <i data-lucide="${n.icon}" class="w-5 h-5 ${n.iconColor}"></i>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between">
              <p class="text-sm font-semibold text-slate-900 ${n.read ? '' : ''}">${n.title}</p>
              <span class="text-xs text-slate-400 ml-3 flex-shrink-0">${n.time}</span>
            </div>
            <p class="text-sm text-slate-500 mt-0.5 leading-relaxed line-clamp-2">${n.body}</p>
          </div>
          ${!n.read ? '<div class="flex-shrink-0 w-2 h-2 rounded-full bg-blue-500 mt-2"></div>' : ''}
        </div>
      `).join('');

      lucide.createIcons();
    }

    function markRead(id) {
      const n = notifications.find(n => n.id === id);
      if (n) n.read = true;
      updateBadges();
      renderList();
    }

    function markAllRead() {
      notifications.forEach(n => n.read = true);
      updateBadges();
      renderList();
      showToast();
    }

    function updateBadges() {
      const unreadAll = notifications.filter(n => !n.read).length;
      const unreadMilestone = notifications.filter(n => !n.read && n.type === 'milestone').length;
      const unreadPayment = notifications.filter(n => !n.read && n.type === 'payment').length;
      const unreadMessage = notifications.filter(n => !n.read && n.type === 'message').length;

      document.getElementById('badge-all').textContent = unreadAll || notifications.length;
      document.getElementById('badge-milestone').textContent = unreadMilestone || notifications.filter(n => n.type === 'milestone').length;
      document.getElementById('badge-payment').textContent = unreadPayment || notifications.filter(n => n.type === 'payment').length;
      document.getElementById('badge-message').textContent = unreadMessage || notifications.filter(n => n.type === 'message').length;

      // Bell badge
      document.getElementById('bell-badge').style.display = unreadAll > 0 ? 'block' : 'none';
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.remove('opacity-0', 'translate-y-2');
      toast.classList.add('opacity-100', 'translate-y-0');
      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-2');
        toast.classList.remove('opacity-100', 'translate-y-0');
      }, 2500);
    }

    // Init
    renderList();
    updateBadges();
  </script>
</body>
</html>
