<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://cdn.tailwindcss.com"></script>

<body>
  <div id="root"></div>

    // Inline SVG icon components (Lucide-style)

    const Activity      = p => <_I {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></_I>;

        <div className="mt-auto bg-slate-800/50 p-4 rounded-3xl border border-slate-700 hidden lg:block">

        </div>
      </aside>

      {/* Main Command Center */}
      <main className="flex-grow p-6 lg:p-10 overflow-y-auto">
        <header className="flex flex-col lg:flex-row lg:items-center justify-between mb-10 gap-6">
          <div>
            <div className="flex items-center space-x-2 text-cyan-400 mb-1">

              <p className="text-xs font-bold text-slate-500 uppercase tracking-widest">{stat.label}</p>

        <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">

                          <div>
                             <div className="flex items-center space-x-2 mb-1">
                                <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">{alert.type}</span>

                             </div>

                  <MapIcon size={400} strokeWidth={0.5} />

               <div className="relative z-10 grid grid-cols-1 lg:grid-cols-2 gap-10">
                  <div>

                    <p className="text-slate-400 text-sm leading-relaxed mb-6">

                    </p>
                    <div className="space-y-4">
                       {regionalDemand.map((region, i) => (
                          <div key={i} className="flex justify-between items-center p-3 bg-white/5 rounded-xl">
                             <div>
                                <p className="text-sm font-bold">{region.area}</p>
                                <p className="text-[10px] text-slate-500">{region.projects} Pending Projects</p>
                             </div>
                             <span className={`text-[10px] font-black px-2 py-0.5 rounded ${region.demand === 'Critical' ? 'bg-red-500/20 text-red-500' : 'bg-cyan-500/20 text-cyan-400'}`}>

                  </div>
                  <div className="bg-cyan-500/10 rounded-3xl border border-cyan-500/20 p-8 text-center flex flex-col justify-center items-center">

               <h4 className="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Team Throughput</h4>
               <div className="space-y-6">
                  {[
                    { name: 'Fixer Fiona', role: 'Ops Lead', projects: 24, status: 'Active' },
                    { name: 'Viral Val', role: 'Growth', projects: 12, status: 'Active' },
                    { name: 'Splat Steve', role: '3D AI', projects: '8/h', status: 'Optimal' }

                    <div key={i} className="flex justify-between items-center">

};

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
