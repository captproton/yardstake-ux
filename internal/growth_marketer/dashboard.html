<!DOCTYPE html>
<html lang="en">
<head>

  <div id="root"></div>

    const ChevronRight  = p => <_I {...p}><path d="m9 18 6-6-6-6"/></_I>;

    const Video         = p => <_I {...p}><path d="m22 8-6 4 6 4V8z"/><rect width="14" height="12" x="2" y="6" rx="2"/></_I>;
    const CheckCircle2  = p => <_I {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></_I>;

              <div className="overflow-x-auto">

                  <tbody className="divide-y divide-slate-50">
                    {heroBuilders.map((builder, i) => (

                        <td className="py-5 px-2 font-medium text-slate-600">{builder.clicks.toLocaleString()}</td>

                  <div className="bg-white/5 p-4 rounded-2xl border border-white/10 text-center">

                  <div className="bg-white/5 p-4 rounded-2xl border border-white/10 text-center border-dashed border-amber-500/30">

                  <div className="flex items-start space-x-4">

                        <p className="text-sm font-bold">Unadopted Demand</p>
                        <p className="text-xs text-slate-500 mt-1">8 homeowners in Seattle requesting Diane's "Glass Loft" unit.</p>
                     </div>
                  </div>
                  <div className="h-4 w-px bg-slate-100 ml-4"></div>
                  <div className="flex items-start space-x-4">
                     <div className="bg-blue-100 p-2 rounded-lg text-blue-600 font-bold text-xs italic">B</div>
                     <div>
                        <p className="text-sm font-bold">Outbound Target</p>
                        <p className="text-xs text-slate-500 mt-1">Local Factory: Northwest Modular. Val's pitch: "We have $1.2M in pre-sold contracts if you adopt this design."</p>
                     </div>
                  </div>
                  <div className="h-4 w-px bg-slate-100 ml-4"></div>
                  <div className="flex items-start space-x-4">
                     <div className="bg-green-100 p-2 rounded-lg text-green-600 font-bold text-xs italic">C</div>
                     <div>
                        <p className="text-sm font-bold">Expansion Success</p>
                        <p className="text-xs text-slate-500 mt-1">Factory signs up. Yardstake expands to WA state with zero ad spend.</p>
                     </div>
                  </div>
               </div>
               <button className="w-full mt-8 py-4 bg-slate-900 text-white rounded-2xl font-bold flex items-center justify-center space-x-2">

            </div>

            <div className="bg-amber-600 rounded-[32px] p-8 text-white shadow-xl shadow-amber-100">

            </div>
          </div>
        </div>
      </main>
    </div>
  );
};

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
