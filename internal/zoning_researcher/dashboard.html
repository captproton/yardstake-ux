<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jurisdiction Research Hub – Yardstake</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/x-template" id="app-tpl">
    <div class="min-h-screen bg-slate-50 flex font-sans text-slate-900">

      <!-- Sidebar -->
      <aside class="w-64 bg-slate-900 text-white p-6 flex-col hidden lg:flex border-r border-slate-800">
        <div class="flex items-center space-x-2 mb-10">
          <span class="text-2xl">&#127968;</span>
          <span class="text-xl font-bold tracking-tight text-white">Yard<span class="text-teal-400">stake</span></span>
        </div>
        <nav class="space-y-1 flex-grow">
          <button
            v-for="item in navItems"
            :key="item.id"
            @click="activeTab = item.id"
            class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all"
            :class="activeTab === item.id ? 'bg-teal-600 text-white shadow-lg shadow-teal-900/40' : 'text-slate-400 hover:bg-slate-800'"
          >
            <component :is="item.icon" :size="18" />
            <span class="text-sm font-bold">{{ item.label }}</span>
          </button>
        </nav>
        <div class="mt-auto pt-6 border-t border-slate-800">
          <div class="flex items-center space-x-3">
            <div class="w-9 h-9 rounded-full bg-teal-600 flex items-center justify-center font-black text-sm">ZZ</div>
            <div>
              <p class="text-sm font-bold text-white">Zoning Zara</p>
              <p class="text-xs text-teal-400">Research Lead</p>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main -->
      <main class="flex-1 p-6 lg:p-10 overflow-y-auto">

        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
          <div>
            <h1 class="text-2xl font-extrabold text-slate-900">Jurisdiction Research Hub</h1>
            <p class="text-sm text-slate-500 mt-1">Oregon Beta — Digital Twin data operations</p>
          </div>
          <button
            @click="handleRefresh"
            class="flex items-center space-x-2 px-4 py-2 bg-teal-600 text-white text-sm font-bold rounded-xl hover:bg-teal-700 transition-colors"
          >
            <i-refresh-ccw :size="15" :class="refreshing ? 'animate-spin' : ''" />
            <span>{{ refreshing ? 'Syncing...' : 'Sync Data' }}</span>
          </button>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
          <div v-for="s in stats" :key="s.label" class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <div class="flex items-center justify-between mb-3">
              <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">{{ s.label }}</p>
              <component :is="s.icon" :size="18" :class="s.color" />
            </div>
            <p class="text-2xl font-extrabold text-slate-900">{{ s.value }}</p>
            <p class="text-xs text-slate-400 mt-1">{{ s.sub }}</p>
          </div>
        </div>

        <!-- PIPELINE TAB -->
        <div v-if="activeTab === 'pipeline'" class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
          <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
            <h2 class="font-extrabold text-slate-800">Oregon Jurisdiction Pipeline</h2>
            <span class="text-xs text-slate-400">8 jurisdictions tracked</span>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-50">
                <tr>
                  <th v-for="h in ['Jurisdiction','Status','Parcels','Data Quality','High / Med / Low','Last Updated','']"
                      :key="h" class="text-left px-5 py-3 text-xs font-bold text-slate-400 uppercase tracking-wider">{{ h }}</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-50">
                <tr v-for="j in jurisdictions" :key="j.name" class="hover:bg-slate-50 transition-colors">
                  <td class="px-5 py-4 font-bold text-slate-800">{{ j.name }}, {{ j.state }}</td>
                  <td class="px-5 py-4">
                    <span class="text-xs font-bold px-2.5 py-1 rounded-full" :class="statusBadge(j.status)">{{ j.status }}</span>
                  </td>
                  <td class="px-5 py-4 text-slate-600">{{ j.parcels }}</td>
                  <td class="px-5 py-4">
                    <div v-if="j.quality > 0" class="flex items-center space-x-2">
                      <div class="w-24 bg-slate-100 rounded-full h-2">
                        <div
                          class="h-2 rounded-full"
                          :class="j.quality >= 90 ? 'bg-teal-500' : j.quality >= 80 ? 'bg-amber-400' : 'bg-red-400'"
                          :style="{ width: j.quality + '%' }"
                        />
                      </div>
                      <span class="text-xs font-bold text-slate-600">{{ j.quality }}%</span>
                    </div>
                    <span v-else class="text-xs text-slate-300">—</span>
                  </td>
                  <td class="px-5 py-4">
                    <div v-if="j.status === 'Active'" class="flex space-x-2 text-xs font-bold">
                      <span class="text-teal-700">{{ j.high }}%</span>
                      <span class="text-slate-300">/</span>
                      <span class="text-amber-600">{{ j.med }}%</span>
                      <span class="text-slate-300">/</span>
                      <span class="text-red-500">{{ j.low }}%</span>
                    </div>
                    <span v-else class="text-xs text-slate-300">Pending</span>
                  </td>
                  <td class="px-5 py-4 text-slate-400 text-xs">{{ j.updated }}</td>
                  <td class="px-5 py-4">
                    <button
                      v-if="j.status === 'Active'"
                      @click.stop="openDrawer(j)"
                      class="text-teal-600 hover:text-teal-800 hover:bg-teal-50 p-1 rounded-lg transition-colors"
                    >
                      <i-chevron-right :size="16" />
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- CONFIDENCE MODEL TAB -->
        <div v-if="activeTab === 'confidence'" class="space-y-6">
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
            <h2 class="font-extrabold text-slate-800 mb-1">Three-Tier Confidence Model</h2>
            <p class="text-sm text-slate-500 mb-6">Thresholds applied across all feasibility queries. Tuned from closed-transaction feedback.</p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
              <div v-for="t in confidenceTiers" :key="t.tier" class="rounded-2xl p-5 border" :class="t.card">
                <div class="flex items-center justify-between mb-3">
                  <span class="text-lg font-extrabold" :class="t.title">{{ t.tier }}</span>
                  <span class="text-xs font-bold px-2 py-1 rounded-full" :class="t.badge">{{ t.range }}</span>
                </div>
                <p class="text-xs text-slate-600 mb-3 leading-relaxed">{{ t.desc }}</p>
                <ul class="space-y-1">
                  <li v-for="c in t.criteria" :key="c" class="text-xs text-slate-500 flex items-start space-x-1.5">
                    <span class="mt-0.5" :class="t.bullet">&#8226;</span>
                    <span>{{ c }}</span>
                  </li>
                </ul>
              </div>
            </div>
          </div>

          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
            <h2 class="font-extrabold text-slate-800 mb-4">Confidence Distribution by Jurisdiction</h2>
            <div class="space-y-4">
              <div v-for="j in activeJurisdictions" :key="j.name" class="flex items-center space-x-4">
                <span class="w-24 text-sm font-bold text-slate-700 shrink-0">{{ j.name }}</span>
                <div class="flex-1 flex rounded-full overflow-hidden h-5">
                  <div class="bg-teal-500 flex items-center justify-center text-white text-[10px] font-bold" :style="{ width: j.high + '%' }">{{ j.high }}%</div>
                  <div class="bg-amber-400 flex items-center justify-center text-white text-[10px] font-bold" :style="{ width: j.med + '%' }">{{ j.med }}%</div>
                  <div class="bg-red-400 flex items-center justify-center text-white text-[10px] font-bold" :style="{ width: j.low + '%' }">{{ j.low }}%</div>
                </div>
              </div>
            </div>
            <div class="flex items-center space-x-6 mt-5 pt-4 border-t border-slate-100">
              <div v-for="leg in legend" :key="leg.label" class="flex items-center space-x-2">
                <div class="w-3 h-3 rounded-full" :class="leg.bg" />
                <span class="text-xs text-slate-500">{{ leg.label }}</span>
              </div>
            </div>
          </div>
        </div>

        <!-- ACCURACY AUDIT TAB -->
        <div v-if="activeTab === 'audit'" class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
          <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
            <div>
              <h2 class="font-extrabold text-slate-800">Closed Transaction Accuracy Audit</h2>
              <p class="text-xs text-slate-400 mt-0.5">12 transactions closed — 11 predictions confirmed correct (91.7%)</p>
            </div>
            <div class="text-right">
              <p class="text-2xl font-extrabold text-teal-600">91.7%</p>
              <p class="text-xs text-slate-400">Accuracy Rate</p>
            </div>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-50">
                <tr>
                  <th v-for="h in ['Project','Jurisdiction','Predicted Tier','Outcome','Match','Notes']"
                      :key="h" class="text-left px-5 py-3 text-xs font-bold text-slate-400 uppercase tracking-wider">{{ h }}</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-50">
                <tr v-for="r in auditRows" :key="r.id" class="hover:bg-slate-50 transition-colors" :class="!r.match ? 'bg-red-50/30' : ''">
                  <td class="px-5 py-3 font-bold text-slate-700">{{ r.id }}</td>
                  <td class="px-5 py-3 text-slate-600">{{ r.jurisdiction }}, OR</td>
                  <td class="px-5 py-3">
                    <span class="text-xs font-bold px-2 py-0.5 rounded-full" :class="predictedBadge(r.predicted)">{{ r.predicted }}</span>
                  </td>
                  <td class="px-5 py-3 text-slate-600">{{ r.outcome }}</td>
                  <td class="px-5 py-3">
                    <i-check-circle2 v-if="r.match" :size="18" class="text-teal-500" />
                    <i-alert-circle v-else :size="18" class="text-red-500" />
                  </td>
                  <td class="px-5 py-3 text-slate-400 text-xs">{{ r.note }}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- DATA QUEUE TAB -->
        <div v-if="activeTab === 'queue'" class="space-y-4">
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
            <h2 class="font-extrabold text-slate-800 mb-1">Incoming Jurisdiction Requests</h2>
            <p class="text-sm text-slate-500 mb-6">Requested by product, sales, or growth. Zara triages and schedules based on data availability and strategic priority.</p>
            <div class="space-y-4">
              <div
                v-for="q in queue"
                :key="q.jurisdiction"
                class="flex items-start justify-between p-4 rounded-xl border border-slate-100 hover:border-teal-200 hover:bg-teal-50/30 transition-all"
              >
                <div class="flex-1">
                  <div class="flex items-center space-x-3 mb-1">
                    <span class="font-bold text-slate-800">{{ q.jurisdiction }}</span>
                    <span class="text-xs font-bold px-2 py-0.5 rounded-full" :class="priorityBadge(q.priority)">{{ q.priority }}</span>
                  </div>
                  <p class="text-xs text-slate-500 mb-1">Requested by: <span class="font-semibold text-slate-700">{{ q.source }}</span></p>
                  <p class="text-xs text-slate-400">{{ q.notes }}</p>
                </div>
                <div class="text-right ml-6 shrink-0">
                  <div class="flex items-center space-x-1 text-xs text-slate-500">
                    <i-clock :size="12" />
                    <span>{{ q.effort }}</span>
                  </div>
                  <button class="mt-2 text-xs font-bold text-teal-600 hover:text-teal-800 transition-colors flex items-center space-x-1">
                    <span>Start Intake</span>
                    <i-chevron-right :size="12" />
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="bg-teal-900 rounded-2xl p-6 text-white">
            <h3 class="font-extrabold mb-1">Data Operations Reality Check</h3>
            <p class="text-sm text-teal-200 leading-relaxed">Each new jurisdiction requires 40–80 hours of research, validation, and rule coding before it goes live. This is not a light software layer — it is the moat. Rushing data quality to hit an expansion target is how the confidence model breaks and homeowners get wrong answers.</p>
            <div class="mt-4 flex items-center space-x-2 text-teal-300 text-xs font-bold">
              <i-shield-check :size="14" />
              <span>Accuracy target: 90%+ in High confidence tier before any jurisdiction goes live.</span>
            </div>
          </div>
        </div>

      </main>

      <!-- ─── Drawer Backdrop ─── -->
      <div
        v-if="drawerOpen"
        @click="closeDrawer"
        class="fixed inset-0 bg-slate-900/40 z-40"
        style="backdrop-filter: blur(2px);"
      />

      <!-- ─── Slide-Over Drawer ─── -->
      <div
        class="fixed top-0 right-0 h-full bg-white shadow-2xl z-50 flex flex-col overflow-hidden"
        style="width: 480px; transition: transform 0.3s ease;"
        :style="{ transform: drawerOpen ? 'translateX(0)' : 'translateX(100%)' }"
      >
        <template v-if="drawer">

          <!-- Drawer Header -->
          <div class="px-6 py-5 border-b border-slate-100 flex items-start justify-between shrink-0">
            <div>
              <div class="flex items-center space-x-3 mb-1">
                <h2 class="text-xl font-extrabold text-slate-900">{{ drawer.name }}, {{ drawer.state }}</h2>
                <span class="text-xs font-bold px-2.5 py-1 rounded-full" :class="statusBadge(drawer.status)">{{ drawer.status }}</span>
              </div>
              <p class="text-xs text-slate-400">{{ drawer.parcels }} parcels &bull; Last updated {{ drawer.updated }}</p>
            </div>
            <button @click="closeDrawer" class="text-slate-400 hover:text-slate-700 transition-colors p-1 rounded-lg hover:bg-slate-100 ml-4 shrink-0">
              <i-x :size="18" />
            </button>
          </div>

          <!-- Drawer Body -->
          <div class="flex-1 overflow-y-auto px-6 py-5 space-y-6">

            <!-- At a Glance -->
            <div>
              <p class="text-xs font-extrabold text-slate-400 uppercase tracking-wider mb-3">At a Glance</p>
              <div class="grid grid-cols-3 gap-3">
                <div class="bg-slate-50 rounded-xl p-3 text-center border border-slate-100">
                  <p class="text-xl font-extrabold"
                    :class="drawer.quality >= 90 ? 'text-teal-600' : drawer.quality >= 80 ? 'text-amber-500' : 'text-red-500'">
                    {{ drawer.quality }}%
                  </p>
                  <p class="text-[11px] text-slate-400 mt-0.5 font-bold">Data Quality</p>
                </div>
                <div class="bg-slate-50 rounded-xl p-3 text-center border border-slate-100">
                  <p class="text-xl font-extrabold text-teal-600">{{ drawer.high }}%</p>
                  <p class="text-[11px] text-slate-400 mt-0.5 font-bold">High Confidence</p>
                </div>
                <div class="bg-slate-50 rounded-xl p-3 text-center border border-slate-100">
                  <p class="text-xl font-extrabold" :class="drawer.accuracy >= 90 ? 'text-teal-600' : 'text-amber-500'">
                    {{ drawer.accuracy }}%
                  </p>
                  <p class="text-[11px] text-slate-400 mt-0.5 font-bold">Accuracy Rate</p>
                </div>
              </div>
            </div>

            <!-- Confidence Distribution -->
            <div>
              <p class="text-xs font-extrabold text-slate-400 uppercase tracking-wider mb-3">Confidence Distribution</p>
              <div class="flex rounded-full overflow-hidden h-6 mb-2">
                <div class="bg-teal-500 flex items-center justify-center text-white text-[11px] font-bold" :style="{ width: drawer.high + '%' }">{{ drawer.high }}%</div>
                <div class="bg-amber-400 flex items-center justify-center text-white text-[11px] font-bold" :style="{ width: drawer.med + '%' }">{{ drawer.med }}%</div>
                <div class="bg-red-400 flex items-center justify-center text-white text-[11px] font-bold" :style="{ width: drawer.low + '%' }">{{ drawer.low }}%</div>
              </div>
              <div class="flex items-center space-x-5 mt-2">
                <div class="flex items-center space-x-1.5"><div class="w-2.5 h-2.5 rounded-full bg-teal-500"/><span class="text-xs text-slate-500">High</span></div>
                <div class="flex items-center space-x-1.5"><div class="w-2.5 h-2.5 rounded-full bg-amber-400"/><span class="text-xs text-slate-500">Medium</span></div>
                <div class="flex items-center space-x-1.5"><div class="w-2.5 h-2.5 rounded-full bg-red-400"/><span class="text-xs text-slate-500">Low</span></div>
              </div>
            </div>

            <!-- Rulebook Status -->
            <div>
              <div class="flex items-center justify-between mb-3">
                <p class="text-xs font-extrabold text-slate-400 uppercase tracking-wider">Rulebook Status</p>
                <span class="text-xs font-bold"
                  :class="drawer.rules.every(r => r.coded) ? 'text-teal-600' : 'text-amber-500'">
                  {{ drawer.rules.filter(r => r.coded).length }} / {{ drawer.rules.length }} coded
                </span>
              </div>
              <div class="space-y-1.5">
                <div v-for="rule in drawer.rules" :key="rule.name"
                  class="flex items-center space-x-3 px-3 py-2 rounded-lg"
                  :class="rule.coded ? 'bg-teal-50' : 'bg-amber-50'">
                  <i-check-circle2 v-if="rule.coded" :size="14" class="text-teal-500 shrink-0" />
                  <div v-else class="w-3.5 h-3.5 rounded-full border-2 border-amber-300 shrink-0" />
                  <span class="text-xs font-mono" :class="rule.coded ? 'text-slate-700' : 'text-amber-700'">{{ rule.name }}</span>
                  <span v-if="!rule.coded" class="ml-auto text-[10px] font-bold text-amber-500 uppercase tracking-wider">pending</span>
                </div>
              </div>
            </div>

            <!-- Recent Queries -->
            <div>
              <p class="text-xs font-extrabold text-slate-400 uppercase tracking-wider mb-3">Recent Feasibility Queries</p>
              <div class="space-y-1">
                <div v-for="q in drawer.recentQueries" :key="q.address"
                  class="flex items-center justify-between px-3 py-2.5 rounded-lg hover:bg-slate-50 transition-colors">
                  <div>
                    <p class="text-sm font-bold text-slate-800">{{ q.address }}</p>
                    <p class="text-xs text-slate-400">{{ q.date }}</p>
                  </div>
                  <span class="text-xs font-bold px-2 py-0.5 rounded-full ml-3 shrink-0"
                    :class="q.tier === 'High' ? 'bg-teal-100 text-teal-700' : q.tier === 'Medium' ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-600'">
                    {{ q.tier }}
                  </span>
                </div>
              </div>
            </div>

          </div>

          <!-- Drawer Footer: Quick Actions -->
          <div class="px-6 py-4 border-t border-slate-100 space-y-2 shrink-0 bg-slate-50">
            <p class="text-xs font-extrabold text-slate-400 uppercase tracking-wider mb-3">Quick Actions</p>
            <a href="ordinance_editor.html"
              class="flex items-center justify-between w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl hover:border-teal-300 hover:bg-teal-50/50 transition-all group">
              <span class="text-sm font-bold text-slate-700 group-hover:text-teal-700">Open Ordinance Editor</span>
              <i-chevron-right :size="16" class="text-slate-300 group-hover:text-teal-500" />
            </a>
            <a href="parcel_review.html"
              class="flex items-center justify-between w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl hover:border-teal-300 hover:bg-teal-50/50 transition-all group">
              <span class="text-sm font-bold text-slate-700 group-hover:text-teal-700">Review Flagged Parcels</span>
              <i-chevron-right :size="16" class="text-slate-300 group-hover:text-teal-500" />
            </a>
            <a href="jurisdiction_intake.html"
              class="flex items-center justify-between w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl hover:border-teal-300 hover:bg-teal-50/50 transition-all group">
              <span class="text-sm font-bold text-slate-700 group-hover:text-teal-700">View Intake Record</span>
              <i-chevron-right :size="16" class="text-slate-300 group-hover:text-teal-500" />
            </a>
          </div>

        </template>
      </div>

    </div>
  </script>

  <script>
    const { createApp, ref, computed } = Vue;

    function makeIcon(paths) {
      return {
        props: { size: { default: 24 }, strokeWidth: { default: 2 } },
        template: `<svg xmlns="http://www.w3.org/2000/svg" :width="size" :height="size" viewBox="0 0 24 24" fill="none" stroke="currentColor" :stroke-width="strokeWidth" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`
      };
    }

    const IcoMap          = makeIcon('<polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/>');
    const IcoDatabase     = makeIcon('<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/>');
    const IcoShieldCheck  = makeIcon('<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/>');
    const IcoBarChart3    = makeIcon('<path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>');
    const IcoCheckCircle2 = makeIcon('<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>');
    const IcoAlertCircle  = makeIcon('<circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>');
    const IcoClock        = makeIcon('<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>');
    const IcoRefreshCcw   = makeIcon('<path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/>');
