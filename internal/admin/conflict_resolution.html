<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conflict Resolution – Yardstake</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Inline SVG icon components (Lucide-style)
    const _I = ({ size = 24, className, children }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
           className={className}>{children}</svg>
    );
    const AlertCircle   = p => <_I {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></_I>;
    const MessageSquare = p => <_I {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></_I>;
    const ImageIcon     = p => <_I {...p}><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></_I>;
    const ShieldAlert   = p => <_I {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="M12 8v4"/><path d="M12 16h.01"/></_I>;
    const CheckCircle   = p => <_I {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></_I>;
    const XCircle       = p => <_I {...p}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></_I>;
    const Scale         = p => <_I {...p}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></_I>;
    const MapPin        = p => <_I {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></_I>;
    const Clock         = p => <_I {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></_I>;
    const History       = p => <_I {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></_I>;
    const FileText      = p => <_I {...p}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><line x1="8" x2="16" y1="13" y2="13"/><line x1="8" x2="14" y1="17" y2="17"/></_I>;
    const User          = p => <_I {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></_I>;
    const ArrowLeft     = p => <_I {...p}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></_I>;
    const DollarSign    = p => <_I {...p}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></_I>;
    const ChevronRight  = p => <_I {...p}><path d="m9 18 6-6-6-6"/></_I>;

    const App = () => {
  const [selectedDispute, setSelectedDispute] = useState(null);

  // Mock data for active conflicts
  const disputes = [
    {
      id: "DISP-1042",
      project: "Project #102: Pinecrest Way",
      homeowner: "Annie Smith",
      builder: "Backyard Bill",
      type: "Change Order Dispute",
      status: "under_review",
      amount: "$6,500.00",
      reason: "Hit bedrock during trenching",
      timestamp: "2 hours ago"
    },
    {
      id: "DISP-1039",
      project: "Project #88: Oak Street",
      homeowner: "John Doe",
      builder: "Modular Mike",
      type: "Milestone Rejection",
      status: "urgent",
      amount: "$60,000.00",
      reason: "Buyer claims framing is incomplete",
      timestamp: "5 hours ago"
    }
  ];

  const DisputeDetailView = ({ dispute, onBack }) => (
    <div className="space-y-6 animate-in fade-in duration-300">
      <button 
        onClick={onBack}
        className="flex items-center text-slate-500 hover:text-slate-800 transition-colors text-sm font-bold"
      >
        <ArrowLeft size={16} className="mr-1" /> Back to Queue
      </button>

      <div className="flex flex-col lg:flex-row gap-6">
        {/* Left Column: Evidence & Context */}
        <div className="flex-grow space-y-6">
          <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
            <div className="flex justify-between items-start mb-6">
              <div>
                <span className="bg-red-100 text-red-600 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">
                  {dispute.type}
                </span>
                <h2 className="text-3xl font-extrabold text-slate-900 mt-2">{dispute.id}: {dispute.project}</h2>
              </div>
              <div className="text-right">
                <p className="text-sm font-bold text-slate-400 uppercase">Disputed Amount</p>
                <p className="text-3xl font-black text-slate-900">{dispute.amount}</p>
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
              <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                <p className="text-xs font-bold text-slate-400 uppercase mb-1">Homeowner</p>
                <p className="font-bold flex items-center text-slate-800">
                   <User size={14} className="mr-2" /> {dispute.homeowner}
                </p>
              </div>
              <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                <p className="text-xs font-bold text-slate-400 uppercase mb-1">Builder</p>
                <p className="font-bold flex items-center text-slate-800">
                   <User size={14} className="mr-2" /> {dispute.builder}
                </p>
              </div>
              <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                <p className="text-xs font-bold text-slate-400 uppercase mb-1">Project Status</p>
                <p className="font-bold text-orange-600">FROZEN</p>
              </div>
            </div>

            <div className="space-y-4">
              <h3 className="text-lg font-bold flex items-center">
                <ImageIcon size={20} className="mr-2 text-blue-600" /> Submitted Proof of Surprise
              </h3>
              <div className="grid grid-cols-2 gap-4">
                <div className="relative group overflow-hidden rounded-2xl border border-slate-200 aspect-video">
                  <img src="https://images.unsplash.com/photo-1516216628859-9bccecab13ca?auto=format&fit=crop&q=80&w=800" alt="Evidence" className="w-full h-full object-cover" />
                  <div className="absolute inset-x-0 bottom-0 bg-black/60 p-3 text-[10px] text-white backdrop-blur-sm">
                    <p className="font-bold">GPS: 37.5630° N, 122.3255° W</p>
                    <p>Timestamp: Feb 25, 10:42 AM PST</p>
                  </div>
                </div>
                <div className="bg-slate-50 rounded-2xl p-6 flex flex-col justify-center border-2 border-dashed border-slate-200">
                  <p className="text-sm text-slate-500 text-center italic leading-relaxed">
                    "Started trenching at 08:00 AM. Hit solid granite bedrock at 3ft depth. Current machinery cannot penetrate. 
                    Requested funds for specialized rock breaker rental (3 days)."
                  </p>
                  <p className="text-[10px] font-bold text-slate-400 mt-4 text-center uppercase">— Backyard Bill</p>
                </div>
              </div>
            </div>
          </div>

          <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
            <h3 className="text-lg font-bold mb-6 flex items-center">
              <MessageSquare size={20} className="mr-2 text-blue-600" /> Platform Audit Trail (Recent Activity)
            </h3>
            <div className="space-y-6">
              {[
                { time: "10:45 AM", user: "Yardstake Bot", msg: "Change Order #42 submitted by Backyard Bill." },
                { time: "11:15 AM", user: "Annie Smith", msg: "REJECTED. 'My neighbor says there is no bedrock in this area. This is a scam.'" },
                { time: "11:20 AM", user: "System", msg: "Project ID #102 auto-frozen due to dispute escalation." },
              ].map((log, i) => (
                <div key={i} className="flex items-start space-x-4">
                  <span className="text-xs font-bold text-slate-400 w-16 mt-1">{log.time}</span>
                  <div className="flex-grow">
                    <p className="text-sm font-bold text-slate-800">{log.user}</p>
                    <p className="text-sm text-slate-500">{log.msg}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Right Column: Adjudication Panel */}
        <div className="w-full lg:w-96 space-y-6">
          <div className="bg-slate-900 text-white rounded-3xl p-8 shadow-xl border border-slate-800">
            <h3 className="text-xl font-bold mb-2 flex items-center">
              <Scale size={20} className="mr-2 text-cyan-400" /> Adjudication
            </h3>
            <p className="text-slate-400 text-sm mb-8 leading-relaxed">
              Review the evidence and contract terms. Your decision will be final per the Yardstake Tri-Party Agreement.
            </p>

            <div className="space-y-3">
              <button className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold flex items-center justify-center space-x-2 transition-all">
                <CheckCircle size={18} />
                <span>Uphold Builder Request</span>
              </button>
              <button className="w-full py-4 bg-slate-800 hover:bg-slate-700 text-white rounded-2xl font-bold border border-slate-700 flex items-center justify-center space-x-2 transition-all">
                <XCircle size={18} />
                <span>Deny & Force Mediation</span>
              </button>
              <div className="py-8 border-t border-slate-800 mt-4">
                <h4 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Internal Notes</h4>
                <textarea 
                  className="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm text-white focus:outline-none h-32"
                  placeholder="Add private note for the legal team..."
                />
              </div>
              <button className="w-full py-3 bg-red-600/20 text-red-500 hover:bg-red-600/30 rounded-2xl font-bold text-sm transition-all">
                Cancel Project & Refund
              </button>
            </div>
          </div>

          <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <h4 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Stakeholder Integrity</h4>
            <div className="space-y-4">
              <div className="flex justify-between items-center">
                <span className="text-xs font-medium text-slate-600 italic">Bill's Rating:</span>
                <span className="text-xs font-bold text-green-600 bg-green-50 px-2 py-1 rounded">4.9 ★ (Elite)</span>
              </div>
              <div className="flex justify-between items-center">
                <span className="text-xs font-medium text-slate-600 italic">Annie's Risk Level:</span>
                <span className="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">Low (First Project)</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-slate-50 font-sans">
      {/* Admin Top Nav */}
      <nav className="bg-slate-900 text-white p-4 sticky top-0 z-50">
        <div className="max-w-7xl mx-auto flex justify-between items-center px-4">
          <div className="flex items-center space-x-3">
            <span className="text-2xl">🏗️</span>
            <span className="text-xl font-bold tracking-tight">Yard<span className="text-cyan-400">stake</span> Admin</span>
          </div>
          <div className="flex items-center space-x-6">
            <div className="relative group cursor-pointer">
              <ShieldAlert size={20} className="text-orange-400" />
              <span className="absolute -top-1 -right-1 bg-red-600 text-[10px] font-black w-4 h-4 flex items-center justify-center rounded-full">2</span>
            </div>
            <div className="flex items-center space-x-2">
               <div className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-xs font-bold">F</div>
               <span className="text-sm font-bold">Fixer Fiona</span>
            </div>
          </div>
        </div>
      </nav>

      <main className="max-w-7xl mx-auto p-4 md:p-8">
        {!selectedDispute ? (
          <div className="space-y-8 animate-in fade-in duration-300">
            <header className="flex flex-col md:flex-row md:items-end justify-between space-y-4 md:space-y-0">
               <div>
                  <h1 className="text-4xl font-extrabold text-slate-900 tracking-tight">Conflict Resolution</h1>
                  <p className="text-slate-500 mt-2">Active disputes requiring platform mediation.</p>
               </div>
               <div className="flex bg-white p-1 rounded-2xl border border-slate-200 shadow-sm">
                  <button className="px-6 py-2 bg-slate-900 text-white rounded-xl text-sm font-bold shadow-md">Active (2)</button>
                  <button className="px-6 py-2 text-slate-400 rounded-xl text-sm font-bold hover:text-slate-600">Resolved (142)</button>
               </div>
            </header>

            {/* Dispute Cards */}
            <div className="grid grid-cols-1 gap-4">
              {disputes.map((dispute) => (
                <div 
                  key={dispute.id}
                  onClick={() => setSelectedDispute(dispute)}
                  className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:border-blue-400 transition-all cursor-pointer group"
                >
                  <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div className="flex items-start space-x-4">
                      <div className={`p-3 rounded-2xl ${dispute.status === 'urgent' ? 'bg-red-50 text-red-600' : 'bg-orange-50 text-orange-600'}`}>
                        <ShieldAlert size={24} />
                      </div>
                      <div>
                        <div className="flex items-center space-x-2 mb-1">
                           <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">{dispute.id}</span>
                           <span className="text-[10px] font-bold px-2 py-0.5 rounded bg-slate-100 text-slate-500 uppercase tracking-widest">{dispute.type}</span>
                        </div>
                        <h3 className="text-xl font-bold text-slate-900 group-hover:text-blue-600 transition-colors">{dispute.project}</h3>
                        <p className="text-sm text-slate-500 mt-1">{dispute.reason}</p>
                      </div>
                    </div>
                    <div className="flex items-center space-x-8 text-right">
                       <div>
                          <p className="text-[10px] font-bold text-slate-400 uppercase">Amount</p>
                          <p className="text-xl font-black text-slate-900">{dispute.amount}</p>
                       </div>
                       <div className="hidden md:block">
                          <p className="text-[10px] font-bold text-slate-400 uppercase">Escalated</p>
                          <p className="text-sm font-bold text-slate-600">{dispute.timestamp}</p>
                       </div>
                       <ChevronRight size={20} className="text-slate-300 group-hover:text-blue-600 transition-all transform group-hover:translate-x-1" />
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        ) : (
          <DisputeDetailView dispute={selectedDispute} onBack={() => setSelectedDispute(null)} />
        )}
      </main>
    </div>
  );
};

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
