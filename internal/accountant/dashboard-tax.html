<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tax Liability Center – Yardstake</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Inline SVG icon components (Lucide-style)
    const _I = ({ size = 24, className, children }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
           className={className}>{children}</svg>
    );
    const BarChart3    = p => <_I {...p}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></_I>;
    const ShieldCheck  = p => <_I {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></_I>;
    const AlertTriangle= p => <_I {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></_I>;
    const Globe        = p => <_I {...p}><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></_I>;
    const FileText     = p => <_I {...p}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><line x1="8" x2="16" y1="13" y2="13"/><line x1="8" x2="14" y1="17" y2="17"/></_I>;
    const RefreshCcw   = p => <_I {...p}><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></_I>;
    const Download     = p => <_I {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></_I>;
    const ArrowUpRight = p => <_I {...p}><path d="M7 7h10v10"/><path d="M7 17 17 7"/></_I>;
    const ChevronRight = p => <_I {...p}><path d="m9 18 6-6-6-6"/></_I>;
    const Database     = p => <_I {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></_I>;
    const Building2    = p => <_I {...p}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></_I>;
    const Scale        = p => <_I {...p}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></_I>;
    const CheckCircle2 = p => <_I {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></_I>;
    const Clock        = p => <_I {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></_I>;

    const App = () => {
  const [isReconciling, setIsReconciling] = useState(false);
  const [selectedState, setSelectedState] = useState('CA');

  const stats = [
    { label: 'Total Tax Collected', value: '$84,240.00', icon: Database, color: 'text-blue-600' },
    { label: 'Pending Remittance', value: '$12,450.00', icon: Clock, color: 'text-orange-500' },
    { label: 'Nexus States', value: '3 Active', icon: Globe, color: 'text-cyan-600' },
    { label: 'Audit Readiness', value: '100%', icon: ShieldCheck, color: 'text-green-600' }
  ];

  const stateBreakdown = {
    CA: { liability: '$52,000', status: 'Due in 5 Days', projects: 14, rate: '8.25% - 10.25%' },
    UT: { liability: '$18,400', status: 'Filed', projects: 8, rate: '6.10% - 9.05%' },
    OR: { liability: '$13,840', status: 'Due in 12 Days', projects: 6, rate: '0% (CAT applies)' }
  };

  const handleReconcile = () => {
    setIsReconciling(true);
    setTimeout(() => setIsReconciling(false), 2000);
  };

  return (
    <div className="min-h-screen bg-slate-50 font-sans text-slate-900 flex">
      {/* Larry's Finance Sidebar */}
      <aside className="w-64 bg-slate-900 text-white p-6 flex flex-col hidden lg:flex">
        <div className="flex items-center space-x-2 mb-10">
          <span className="text-2xl">🏗️</span>
          <span className="text-xl font-bold tracking-tight text-white">Yard<span className="text-cyan-400">stake</span></span>
        </div>
        <nav className="space-y-1 flex-grow">
          {[
            { label: 'Treasury Overview', icon: BarChart3 },
            { label: 'Tax & Remittance', icon: Scale, active: true },
            { label: 'Stripe Ledger', icon: Database },
            { label: 'Audit Logs', icon: FileText },
            { label: 'Compliance', icon: ShieldCheck }
          ].map((item) => (
            <button
              key={item.label}
              className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${
                item.active ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/40' : 'text-slate-400 hover:bg-slate-800'
              }`}
            >
              <item.icon size={18} />
              <span className="text-sm font-bold">{item.label}</span>
            </button>
          ))}
        </nav>
        <div className="p-4 bg-slate-800 rounded-2xl">
          <p className="text-[10px] font-bold text-slate-500 uppercase mb-2 italic">Avalara API Status</p>
          <div className="flex items-center space-x-2">
            <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
            <span className="text-xs font-bold text-slate-200">Connected & Synced</span>
          </div>
        </div>
      </aside>

      {/* Main Content */}
      <main className="flex-grow p-4 md:p-10 lg:p-12 overflow-y-auto">
        <header className="flex flex-col md:flex-row md:items-end justify-between mb-10 gap-4">
          <div>
            <div className="flex items-center space-x-2 text-blue-600 mb-1">
               <Scale size={14} />
               <span className="text-[10px] font-black uppercase tracking-widest">Finance Operations</span>
            </div>
            <h1 className="text-4xl font-black tracking-tight text-slate-900">Tax Liability Center</h1>
            <p className="text-slate-500 mt-2">Ledger Larry's dashboard for multi-state sales and property tax management.</p>
          </div>
          <div className="flex space-x-3">
             <button 
              onClick={handleReconcile}
              className="bg-white px-6 py-3 border border-slate-200 rounded-2xl text-sm font-bold flex items-center space-x-2 shadow-sm hover:bg-slate-50 transition-all active:scale-95"
             >
                <RefreshCcw size={18} className={isReconciling ? 'animate-spin text-blue-600' : ''} />
                <span>{isReconciling ? 'Syncing...' : 'Sync Avalara'}</span>
             </button>
             <button className="bg-slate-900 text-white px-6 py-3 rounded-2xl text-sm font-bold flex items-center space-x-2 shadow-lg hover:bg-slate-800 transition-all">
                <Download size={18} />
                <span>Export Tax Report</span>
             </button>
          </div>
        </header>

        {/* Top KPIs */}
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
          {stats.map((stat, i) => (
            <div key={i} className="bg-white p-6 rounded-[32px] border border-slate-200 shadow-sm">
              <div className="p-3 rounded-xl bg-slate-50 w-fit mb-4">
                <stat.icon size={20} className={stat.color} />
              </div>
              <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">{stat.label}</p>
              <p className="text-3xl font-black mt-1">{stat.value}</p>
            </div>
          ))}
        </div>

        <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
          {/* Left: State Breakdown Table */}
          <div className="xl:col-span-2 space-y-8">
            <div className="bg-white rounded-[40px] p-8 md:p-10 border border-slate-200 shadow-sm">
              <div className="flex justify-between items-center mb-8">
                <h3 className="text-xl font-bold flex items-center">
                  <Globe size={20} className="mr-2 text-cyan-600" /> Jurisdictional Nexus Heatmap
                </h3>
                <div className="flex bg-slate-100 p-1 rounded-xl">
                  {['CA', 'UT', 'OR'].map(state => (
                    <button 
                      key={state}
                      onClick={() => setSelectedState(state)}
                      className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${selectedState === state ? 'bg-white shadow-sm text-slate-900' : 'text-slate-400'}`}
                    >
                      {state}
                    </button>
                  ))}
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                 <div className="space-y-6">
                    <div className="p-6 bg-slate-50 rounded-3xl border border-slate-100">
                       <p className="text-xs font-bold text-slate-400 uppercase mb-2">{selectedState} Liability Accrued</p>
                       <p className="text-4xl font-black text-slate-900">{stateBreakdown[selectedState].liability}</p>
                       <div className="mt-4 flex items-center space-x-2">
                          <span className={`w-2 h-2 rounded-full ${stateBreakdown[selectedState].status === 'Filed' ? 'bg-green-500' : 'bg-orange-500'}`}></span>
                          <span className="text-xs font-bold text-slate-600 uppercase tracking-widest">{stateBreakdown[selectedState].status}</span>
                       </div>
                    </div>
                    <div className="space-y-4">
                       <div className="flex justify-between text-sm">
                          <span className="text-slate-500 font-medium">Active Projects:</span>
                          <span className="font-bold">{stateBreakdown[selectedState].projects} Units</span>
                       </div>
                       <div className="flex justify-between text-sm">
                          <span className="text-slate-500 font-medium">Statutory Rate Range:</span>
                          <span className="font-bold">{stateBreakdown[selectedState].rate}</span>
                       </div>
                    </div>
                    <button className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-xl shadow-blue-200 flex items-center justify-center space-x-2">
                       <span>Review {selectedState} Txn Log</span>
                       <ArrowUpRight size={18} />
                    </button>
                 </div>
                 <div className="bg-slate-900 aspect-square rounded-[40px] flex items-center justify-center p-8 relative overflow-hidden group">
                    {/* Mock Map View */}
                    <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1526772662000-3f88f10405ff?auto=format&fit=crop&q=80&w=800')] bg-cover bg-center opacity-40 grayscale"></div>
                    <div className="relative z-10 text-center">
                       <div className="w-12 h-12 bg-blue-500/80 rounded-full animate-ping absolute -top-4 -left-4"></div>
                       <div className="bg-white p-4 rounded-2xl shadow-2xl">
                          <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Active Audit</p>
                          <p className="text-lg font-black text-slate-900">San Mateo County</p>
                          <p className="text-xs font-bold text-blue-600">Local Nexus: OK</p>
                       </div>
                    </div>
                 </div>
              </div>
            </div>

            {/* Reconciliation Log */}
            <div className="bg-white rounded-[40px] p-8 md:p-10 border border-slate-200 shadow-sm">
              <h3 className="text-xl font-bold mb-6">Recent Reconciliation Events</h3>
              <div className="space-y-4">
                {[
                  { event: 'Avalara Commit - Feb Batch', date: 'Feb 25, 2026', type: 'SUCCESS', msg: '1,420 transactions locked.' },
                  { event: 'Tax Exemption Validation', date: 'Feb 24, 2026', type: 'PENDING', msg: 'Builder Mike submitted Resale Cert for Proj #102.' },
                  { event: 'Nexus Alert: Washington', date: 'Feb 22, 2026', type: 'WARNING', msg: 'Pending project in Seattle requires WA registration.' },
                ].map((log, i) => (
                  <div key={i} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100 group hover:border-blue-400 transition-all cursor-pointer">
                    <div className="flex items-center space-x-4">
                      <div className={`p-2 rounded-lg ${log.type === 'SUCCESS' ? 'bg-green-100 text-green-600' : log.type === 'WARNING' ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-600'}`}>
                         {log.type === 'SUCCESS' ? <CheckCircle2 size={18} /> : log.type === 'WARNING' ? <AlertTriangle size={18} /> : <Clock size={18} />}
                      </div>
                      <div>
                        <p className="text-sm font-bold text-slate-800">{log.event}</p>
                        <p className="text-xs text-slate-500">{log.msg}</p>
                      </div>
                    </div>
                    <span className="text-xs font-medium text-slate-400">{log.date}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Right: Compliance Toolbox */}
          <div className="space-y-6">
            <div className="bg-white p-8 rounded-[40px] border border-slate-200 shadow-sm">
               <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center">
                 <ShieldCheck size={14} className="mr-2" /> Larry's Compliance Tools
               </h4>
               <div className="space-y-4">
                  <button className="w-full p-4 bg-slate-50 rounded-2xl text-left hover:bg-slate-100 transition-all group">
                     <div className="flex justify-between items-center">
                        <span className="text-sm font-bold">Manage Resale Certs</span>
                        <ChevronRight size={16} className="text-slate-300 group-hover:text-blue-600" />
                     </div>
                  </button>
                  <button className="w-full p-4 bg-slate-50 rounded-2xl text-left hover:bg-slate-100 transition-all group">
                     <div className="flex justify-between items-center">
                        <span className="text-sm font-bold">Update State Permits</span>
                        <ChevronRight size={16} className="text-slate-300 group-hover:text-blue-600" />
                     </div>
                  </button>
                  <button className="w-full p-4 bg-slate-50 rounded-2xl text-left hover:bg-slate-100 transition-all group">
                     <div className="flex justify-between items-center">
                        <span className="text-sm font-bold">Avalara Log-in</span>
                        <ArrowUpRight size={16} className="text-slate-300 group-hover:text-blue-600" />
                     </div>
                  </button>
               </div>

               <div className="mt-8 p-6 bg-blue-600 rounded-3xl text-white shadow-xl shadow-blue-100 relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-24 h-24 bg-white/10 rounded-full blur-2xl -mr-8 -mt-8"></div>
                  <h5 className="font-bold text-lg mb-2">CAT Reminder (OR)</h5>
                  <p className="text-blue-100 text-xs leading-relaxed mb-4">
                    Oregon Corporate Activity Tax (CAT) filings are due for the previous quarter.
                  </p>
                  <button className="bg-white text-blue-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-md">
                    Execute Filing
                  </button>
               </div>
            </div>

            {/* Audit Readiness Card */}
            <div className="bg-slate-900 rounded-[40px] p-8 text-white">
               <div className="flex items-center space-x-3 mb-6">
                  <Building2 size={24} className="text-cyan-400" />
                  <h4 className="text-lg font-bold">Audit Shield Status</h4>
               </div>
               <div className="space-y-6">
                  <div className="space-y-2">
                     <div className="flex justify-between text-xs font-bold text-slate-500 uppercase tracking-widest">
                        <span>Digital Proof Compliance</span>
                        <span>98%</span>
                     </div>
                     <div className="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                        <div className="h-full bg-green-400" style={{ width: '98%' }}></div>
                     </div>
                  </div>
                  <div className="space-y-2">
                     <div className="flex justify-between text-xs font-bold text-slate-500 uppercase tracking-widest">
                        <span>Lien Waiver Matching</span>
                        <span>100%</span>
                     </div>
                     <div className="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                        <div className="h-full bg-green-400" style={{ width: '100%' }}></div>
                     </div>
                  </div>
               </div>
               <p className="text-[10px] text-slate-500 mt-6 leading-relaxed italic">
                 Larry: All Proj #102 tax line-items are backed by geo-tagged rebar photos and e-signatures.
               </p>
            </div>
          </div>
        </div>
      </main>
    </div>
  );
};

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
