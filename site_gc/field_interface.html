<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Field Interface – Yardstake</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Inline SVG icon components (Lucide-style)
    const _I = ({ size = 24, className, children }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
           className={className}>{children}</svg>
    );
    const Camera        = p => <_I {...p}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></_I>;
    const DollarSign    = p => <_I {...p}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></_I>;
    const AlertTriangle = p => <_I {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></_I>;
    const CheckCircle2  = p => <_I {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></_I>;
    const Info          = p => <_I {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></_I>;
    const MapPin        = p => <_I {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></_I>;
    const Clock         = p => <_I {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></_I>;
    const ChevronRight  = p => <_I {...p}><path d="m9 18 6-6-6-6"/></_I>;
    const Upload        = p => <_I {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></_I>;
    const X             = p => <_I {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></_I>;

    const App = () => {
  const [view, setView] = useState('tasks'); // 'tasks' or 'change_order'
  const [photos, setPhotos] = useState([]);
  const [isUploading, setIsUploading] = useState(false);
  const [locationEnabled, setLocationEnabled] = useState(true);

  // Mock data for the current milestone
  const currentMilestone = {
    title: "Foundation Poured",
    amount: "30,000.00",
    address: "123 Pinecrest Way, San Mateo",
    requiredPhotos: 3
  };

  const handlePhotoUpload = (e) => {
    setIsUploading(true);
    // Simulate upload delay
    setTimeout(() => {
      setPhotos([...photos, URL.createObjectURL(e.target.files[0])]);
      setIsUploading(false);
    }, 800);
  };

  const removePhoto = (index) => {
    setPhotos(photos.filter((_, i) => i !== index));
  };

  return (
    <div className="min-h-screen bg-slate-900 text-white font-sans max-w-md mx-auto">
      {/* High-Contrast Header */}
      <header className="p-6 bg-slate-800 border-b border-slate-700 sticky top-0 z-50">
        <div className="flex justify-between items-center mb-1">
          <div className="flex items-center space-x-2">
            <span className="text-2xl">🏗️</span>
            <span className="text-xl font-bold tracking-tight">Yard<span className="text-cyan-400">stake</span></span>
          </div>
          <div className="bg-green-500/10 text-green-500 px-3 py-1 rounded-full text-xs font-bold border border-green-500/20">
            Link Active
          </div>
        </div>
        <div className="flex items-center text-slate-400 text-sm mt-2">
          <MapPin size={14} className="mr-1" />
          <span className="truncate">{currentMilestone.address}</span>
        </div>
      </header>

      {/* Main Action Area */}
      <main className="p-6 space-y-6">
        
        {view === 'tasks' ? (
          <>
            {/* Payout Card */}
            <div className="bg-blue-600 rounded-3xl p-6 shadow-xl shadow-blue-900/20 border border-blue-500">
              <div className="flex justify-between items-start mb-4">
                <div>
                  <p className="text-blue-100 text-xs font-bold uppercase tracking-widest">Current Milestone</p>
                  <h2 className="text-2xl font-black mt-1">{currentMilestone.title}</h2>
                </div>
                <div className="bg-white/20 p-2 rounded-xl">
                  <DollarSign size={24} className="text-white" />
                </div>
              </div>
              
              <div className="flex items-baseline space-x-1 mb-6">
                <span className="text-4xl font-black">$</span>
                <span className="text-5xl font-black tracking-tighter">{currentMilestone.amount.split('.')[0]}</span>
                <span className="text-2xl font-bold">.{currentMilestone.amount.split('.')[1]}</span>
              </div>

              <div className="bg-blue-700/50 rounded-2xl p-4 border border-blue-400/30">
                <p className="text-xs text-blue-100 leading-relaxed font-medium">
                  Status: <span className="text-white font-bold">Waiting for Proof of Work</span>. 
                  Money is secured in the project balance and ready for transfer.
                </p>
              </div>
            </div>

            {/* Photo Upload Section */}
            <div className="space-y-4">
              <div className="flex justify-between items-center">
                <h3 className="font-bold text-lg">Upload Photos</h3>
                <span className="text-xs font-bold text-slate-500 uppercase tracking-widest">
                  {photos.length} of {currentMilestone.requiredPhotos} Added
                </span>
              </div>

              {/* Photo Grid */}
              <div className="grid grid-cols-3 gap-3">
                {photos.map((url, idx) => (
                  <div key={idx} className="aspect-square rounded-2xl bg-slate-800 border-2 border-slate-700 overflow-hidden relative group">
                    <img src={url} alt="Proof" className="w-full h-full object-cover" />
                    <button 
                      onClick={() => removePhoto(idx)}
                      className="absolute top-1 right-1 bg-black/60 rounded-full p-1"
                    >
                      <X size={14} />
                    </button>
                  </div>
                ))}
                
                {photos.length < 6 && (
                  <label className="aspect-square rounded-2xl bg-slate-800 border-2 border-dashed border-slate-600 flex flex-col items-center justify-center cursor-pointer active:bg-slate-700 transition-colors">
                    <input type="file" accept="image/*" className="hidden" onChange={handlePhotoUpload} />
                    {isUploading ? (
                      <div className="animate-spin rounded-full h-6 w-6 border-2 border-cyan-400 border-t-transparent" />
                    ) : (
                      <>
                        <Camera size={24} className="text-cyan-400 mb-1" />
                        <span className="text-[10px] font-bold text-slate-400 uppercase">Snap</span>
                      </>
                    )}
                  </label>
                )}
              </div>

              {/* Geotag Warning */}
              {!locationEnabled ? (
                <div className="bg-red-500/10 border border-red-500/50 p-4 rounded-2xl flex items-start space-x-3">
                  <AlertTriangle className="text-red-500 shrink-0" size={20} />
                  <p className="text-xs text-red-200 leading-tight">
                    <span className="font-bold block mb-1 uppercase">Location Disabled</span>
                    We need GPS tags to prove you are on-site. Please enable Location Services in your browser to get paid.
                  </p>
                </div>
              ) : (
                <div className="bg-slate-800 border border-slate-700 p-4 rounded-2xl flex items-center space-x-3">
                  <CheckCircle2 className="text-cyan-400" size={20} />
                  <p className="text-xs text-slate-400 font-medium">
                    Geo-tagging active: <span className="text-white">San Mateo, CA</span>
                  </p>
                </div>
              )}

              {/* Submit Button */}
              <button 
                disabled={photos.length < currentMilestone.requiredPhotos}
                className={`w-full py-5 rounded-3xl font-black text-lg shadow-xl transition-all active:scale-95 flex items-center justify-center space-x-3 ${
                  photos.length >= currentMilestone.requiredPhotos 
                  ? 'bg-cyan-500 text-slate-900 shadow-cyan-500/20' 
                  : 'bg-slate-700 text-slate-500 cursor-not-allowed'
                }`}
              >
                <Upload size={20} />
                <span>Submit for Payout</span>
              </button>
            </div>

            {/* Secondary Action */}
            <button 
              onClick={() => setView('change_order')}
              className="w-full py-4 rounded-2xl bg-slate-800 border border-red-500/30 text-red-400 text-sm font-bold flex items-center justify-center space-x-2"
            >
              <AlertTriangle size={16} />
              <span>Request Change Order (Surprise)</span>
            </button>
          </>
        ) : (
          /* Change Order View */
          <div className="space-y-6 animate-in slide-in-from-right duration-300">
            <div className="flex items-center justify-between">
              <h2 className="text-2xl font-black text-red-500 uppercase italic tracking-tighter">Site Surprise</h2>
              <button onClick={() => setView('tasks')} className="text-slate-400 text-sm font-bold">Cancel</button>
            </div>

            <div className="space-y-4">
              <div>
                <label className="text-xs font-bold text-slate-500 uppercase mb-2 block tracking-widest">What's the issue?</label>
                <textarea 
                  className="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 text-white focus:outline-none focus:border-red-500 h-32"
                  placeholder="e.g. Hit solid bedrock during trenching, need rock breaker rental..."
                />
              </div>

              <div>
                <label className="text-xs font-bold text-slate-500 uppercase mb-2 block tracking-widest">Extra Amount Requested</label>
                <div className="relative">
                  <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-bold">$</span>
                  <input 
                    type="number"
                    className="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 pl-8 text-white focus:outline-none focus:border-red-500 font-bold text-xl"
                    placeholder="0.00"
                  />
                </div>
              </div>

              <div>
                <label className="text-xs font-bold text-slate-500 uppercase mb-2 block tracking-widest">Proof Photo</label>
                <label className="w-full aspect-video rounded-2xl bg-slate-800 border-2 border-dashed border-red-500/30 flex flex-col items-center justify-center cursor-pointer active:bg-slate-700">
                  <Camera size={32} className="text-red-500 mb-2" />
                  <span className="text-sm font-bold text-red-500/70">Show us the problem</span>
                </label>
              </div>

              <button className="w-full py-5 rounded-3xl bg-red-600 text-white font-black text-lg shadow-xl shadow-red-900/20">
                Send to Homeowner
              </button>
            </div>
          </div>
        )}

      </main>

      {/* Statutory Footer */}
      <footer className="p-8 border-t border-slate-800 mt-12 space-y-4">
        <div className="flex items-center space-x-2 text-slate-500">
          <Info size={14} />
          <p className="text-[10px] font-bold uppercase tracking-wider">Yardstake Legal Protection</p>
        </div>
        <p className="text-[10px] text-slate-600 leading-relaxed italic">
          Yardstake acts as the authorized Agent of the Payee. Payouts are ledgered in Project-Specific balances. 
          By submitting proof of work, you certify that work is complete per local building code. 
          Payouts will be initiated immediately upon buyer approval.
        </p>
      </footer>
    </div>
  );
};

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
