<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homeowner Dashboard – Yardstake</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const _I = ({ size = 24, className, children }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
           className={className}>{children}</svg>
    );
    const MapPin       = p => <_I {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></_I>;
    const FileText     = p => <_I {...p}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><line x1="8" x2="16" y1="13" y2="13"/><line x1="8" x2="14" y1="17" y2="17"/></_I>;
    const CheckCircle  = p => <_I {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></_I>;
    const Download     = p => <_I {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></_I>;
    const Home         = p => <_I {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></_I>;
    const ArrowRight   = p => <_I {...p}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></_I>;
    const MessageSquare= p => <_I {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></_I>;
    const DollarSign   = p => <_I {...p}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></_I>;
    const Ruler        = p => <_I {...p}><path d="M21.3 8.7 8.7 21.3c-1 1-2.5 1-3.4 0l-2.6-2.6c-1-1-1-2.5 0-3.4L15.3 2.7c1-1 2.5-1 3.4 0l2.6 2.6c1 1 1 2.5 0 3.4Z"/><path d="m7.5 10.5 2 2"/><path d="m10.5 7.5 2 2"/><path d="m13.5 4.5 2 2"/><path d="m4.5 13.5 2 2"/></_I>;

    const matchedModels = [
      { name: "Skyline Studio 600", manufacturer: "Cascade ADU Works", sqft: 600, price: "$148,000", fit: "Perfect fit", badge: "bg-green-100 text-green-800" },
      { name: "Urban Nest 480", manufacturer: "Pacific Prefab Oregon", sqft: 480, price: "$122,000", fit: "Great fit", badge: "bg-green-100 text-green-800" },
      { name: "Portland Standard 750", manufacturer: "Cascade ADU Works", sqft: 750, price: "$171,000", fit: "At envelope limit", badge: "bg-amber-100 text-amber-800" },
    ];

    const App = () => {
      const [activeTab, setActiveTab] = useState('overview');

      const StatCard = ({ title, value, sub, icon: Icon, color, textColor }) => (
        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
          <div className="flex items-center justify-between mb-2">
            <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">{title}</span>
            <div className={`p-2 rounded-lg ${color}`}>
              <Icon size={16} className="text-white" />
            </div>
          </div>
          <div className={`text-2xl font-bold ${textColor || 'text-slate-900'}`}>{value}</div>
          {sub && <div className="text-xs text-slate-400 mt-1">{sub}</div>}
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row font-sans">
          {/* Sidebar */}
          <aside className="w-full md:w-64 bg-slate-900 text-white flex flex-col p-6 space-y-8">
            <div className="flex items-center space-x-3 px-2">
              <div className="text-2xl">&#127968;</div>
              <span className="text-xl font-bold tracking-tight">Yard<span className="text-cyan-400">stake</span></span>
            </div>

            <nav className="flex-grow space-y-2">
              {[
                { label: 'Overview', key: 'overview' },
                { label: 'My Report', key: 'report' },
                { label: 'Matched Models', key: 'models' },
                { label: 'My Inquiry', key: 'inquiry' },
              ].map((item) => (
                <button
                  key={item.key}
                  onClick={() => setActiveTab(item.key)}
                  className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${
                    activeTab === item.key
                    ? 'bg-cyan-600 text-white'
                    : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                  }`}
                >
                  <span className="text-sm font-semibold">{item.label}</span>
                </button>
              ))}
            </nav>

            <div className="p-4 bg-slate-800 rounded-2xl text-xs text-slate-400 space-y-1">
              <p className="font-bold text-slate-300 text-sm">$49 Report Credit</p>
              <p>Your report fee applies toward your ADU purchase.</p>
              <div className="mt-2 py-1 px-3 bg-cyan-600/20 text-cyan-400 rounded-lg font-bold text-xs inline-block">Credit ready: $49.00</div>
            </div>
          </aside>

          {/* Main */}
          <main className="flex-grow p-4 md:p-10 overflow-y-auto">
            <header className="flex flex-col md:flex-row md:items-end justify-between mb-10 space-y-4 md:space-y-0">
              <div>
                <h1 className="text-3xl md:text-4xl font-extrabold text-slate-900">Welcome, Annie.</h1>
                <p className="text-slate-500 mt-2 flex items-center gap-1">
                  <MapPin size={14} /> 742 SE Morrison St, Portland, OR 97214
                </p>
              </div>
              <a href="#" className="flex items-center space-x-2 bg-cyan-600 text-white px-6 py-2 rounded-xl text-sm font-semibold shadow-md hover:bg-cyan-700 transition-colors">
                <Download size={16} />
                <span>Download My Report</span>
              </a>
            </header>

            {/* Stats */}
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
              <StatCard title="Feasibility Result" value="High Confidence" sub="Your lot qualifies for an ADU" icon={CheckCircle} color="bg-green-500" textColor="text-green-700" />
              <StatCard title="Buildable Area" value="Up to 800 sq ft" sub="After Portland setbacks applied" icon={Ruler} color="bg-cyan-500" />
              <StatCard title="Matched Models" value="3 ADUs" sub="Fit your lot today" icon={Home} color="bg-blue-600" />
              <StatCard title="Report Credit" value="$49.00" sub="Applied to your ADU purchase" icon={DollarSign} color="bg-slate-700" />
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
              {/* Left: Report Summary + Matched Models */}
              <div className="lg:col-span-2 space-y-8">

                {/* Feasibility Summary */}
                <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
                  <h3 className="text-lg font-bold text-slate-900 mb-6">Your Feasibility Report — 742 SE Morrison St</h3>
                  <div className="grid grid-cols-2 gap-4 text-sm">
                    {[
                      { label: "Confidence Tier", value: "High", highlight: true },
                      { label: "Jurisdiction", value: "City of Portland" },
                      { label: "Rear Setback", value: "5 ft" },
                      { label: "Side Setbacks", value: "4 ft each" },
                      { label: "Max Height", value: "20 ft" },
                      { label: "Max Unit Size", value: "800 sq ft" },
                      { label: "Parking Required", value: "No (transit waiver)" },
                      { label: "Permit Type", value: "Ministerial (no hearing)" },
                    ].map((row, i) => (
                      <div key={i} className={`p-3 rounded-xl ${row.highlight ? 'bg-green-50 border border-green-200' : 'bg-slate-50'}`}>
                        <p className="text-xs text-slate-500 uppercase font-bold tracking-wide">{row.label}</p>
                        <p className={`font-bold mt-0.5 ${row.highlight ? 'text-green-700' : 'text-slate-800'}`}>{row.value}</p>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Matched Models */}
                <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
                  <h3 className="text-lg font-bold text-slate-900 mb-2">ADUs That Fit Your Lot</h3>
                  <p className="text-sm text-slate-400 mb-6">Filtered to your buildable envelope. Oregon manufacturers only.</p>
                  <div className="space-y-4">
                    {matchedModels.map((model, i) => (
                      <div key={i} className="flex items-center justify-between p-4 rounded-2xl border border-slate-100 hover:border-cyan-200 hover:bg-cyan-50/30 transition-all group">
                        <div className="flex items-center space-x-4">
                          <div className="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center text-xl">&#127968;</div>
                          <div>
                            <p className="font-bold text-slate-900 text-sm group-hover:text-cyan-700">{model.name}</p>
                            <p className="text-xs text-slate-400">{model.manufacturer} &middot; {model.sqft} sq ft</p>
                          </div>
                        </div>
                        <div className="flex items-center gap-4">
                          <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${model.badge}`}>{model.fit}</span>
                          <span className="font-bold text-slate-900 text-sm">{model.price}</span>
                          <button className="text-cyan-600 hover:text-cyan-800">
                            <ArrowRight size={16} />
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* Right: Inquiry + Next Steps */}
              <div className="space-y-6">
                {/* Active Inquiry */}
                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                  <h4 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Your Inquiry</h4>
                  <div className="flex items-center space-x-3 mb-4">
                    <div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center font-bold text-blue-700 text-sm">CW</div>
                    <div>
                      <p className="text-sm font-bold text-slate-900">Cascade ADU Works</p>
                      <p className="text-xs text-slate-400">Portland, OR &middot; Responded 2h ago</p>
                    </div>
                  </div>
                  <div className="p-3 bg-green-50 rounded-xl border border-green-100 text-xs text-green-800 font-medium mb-4">
                    They've reviewed your report and are ready to talk.
                  </div>
                  <button className="w-full py-2.5 bg-slate-900 text-white rounded-xl text-sm font-bold hover:bg-slate-700 flex items-center justify-center gap-2 transition-colors">
                    <MessageSquare size={14} />
                    Reply to Cascade ADU Works
                  </button>
                </div>

                {/* Next Steps */}
                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                  <h4 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Next Steps</h4>
                  <div className="space-y-3 text-sm">
                    {[
                      { done: true, text: "Free feasibility check" },
                      { done: true, text: "Purchase premium report ($49)" },
                      { done: true, text: "Contact a matched manufacturer" },
                      { done: false, text: "Select your ADU model" },
                      { done: false, text: "Initiate purchase ($49 credit applied)" },
                    ].map((step, i) => (
                      <div key={i} className={`flex items-center gap-3 ${step.done ? 'text-slate-400 line-through' : 'text-slate-800 font-medium'}`}>
                        <CheckCircle size={16} className={step.done ? 'text-green-500' : 'text-slate-200'} />
                        {step.text}
                      </div>
                    ))}
                  </div>
                </div>

                {/* Report Download */}
                <div className="bg-gradient-to-br from-cyan-600 to-blue-700 rounded-3xl p-6 text-white shadow-xl">
                  <FileText size={24} className="mb-3 text-cyan-200" />
                  <h4 className="font-bold mb-1">Premium Feasibility Report</h4>
                  <p className="text-xs text-cyan-100 mb-4">Portland, OR &middot; 742 SE Morrison St &middot; Purchased Mar 6, 2026</p>
                  <button className="w-full py-2 bg-white text-blue-800 rounded-xl text-xs font-bold hover:bg-cyan-50 flex items-center justify-center gap-2 transition-colors">
                    <Download size={14} />
                    Download PDF
                  </button>
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
