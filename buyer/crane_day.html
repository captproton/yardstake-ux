<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crane Day – Yardstake</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Inline SVG icon components (Lucide-style)
    const _I = ({ size = 24, className, children }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
           className={className}>{children}</svg>
    );
    const CheckCircle2  = p => <_I {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></_I>;
    const Camera        = p => <_I {...p}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></_I>;
    const ChevronRight  = p => <_I {...p}><path d="m9 18 6-6-6-6"/></_I>;
    const AlertCircle   = p => <_I {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></_I>;
    const ShieldCheck   = p => <_I {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></_I>;
    const ArrowLeft     = p => <_I {...p}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></_I>;
    const X             = p => <_I {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></_I>;
    const FileText      = p => <_I {...p}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><line x1="8" x2="16" y1="13" y2="13"/><line x1="8" x2="14" y1="17" y2="17"/></_I>;
    const Star          = p => <_I {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></_I>;
    const Truck         = p => <_I {...p}><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/><rect width="7" height="7" x="14" y="11" rx="1"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></_I>;
    const Package       = p => <_I {...p}><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></_I>;
    const Key           = p => <_I {...p}><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></_I>;
    const DollarSign    = p => <_I {...p}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></_I>;

    const App = () => {
  const [view, setView] = useState('welcome'); // welcome, punch-list, final-signoff, success
  const [punchListItems, setPunchListItems] = useState([]);
  const [isSubmitting, setIsSubmitting] = useState(false);

  // Mock project data
  const project = {
    id: "102",
    model: "Modern Sanctuary XL",
    builder: "Modular Mike / Backyard Bill",
    holdbackAmount: 7500,
    totalProject: 150000
  };

  const addPunchListItem = (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const newItem = {
      id: Date.now(),
      title: formData.get('item'),
      status: 'pending',
      photo: 'https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&q=80&w=200' // Placeholder
    };
    setPunchListItems([...punchListItems, newItem]);
    e.target.reset();
  };

  const handleFinalSubmit = () => {
    setIsSubmitting(true);
    setTimeout(() => {
      setIsSubmitting(false);
      setView('success');
    }, 2000);
  };

  return (
    <div className="min-h-screen bg-slate-50 font-sans text-slate-900">
      {/* Top Navbar */}
      <nav className="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-50">
        <div className="max-w-4xl mx-auto flex items-center justify-between">
          <div className="flex items-center space-x-2">
            <span className="text-2xl">🏗️</span>
            <span className="text-xl font-bold tracking-tight">Yard<span className="text-blue-600">stake</span></span>
          </div>
          <div className="bg-blue-50 px-3 py-1 rounded-full border border-blue-100 flex items-center space-x-2">
            <div className="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
            <span className="text-[10px] font-black text-blue-600 uppercase tracking-widest">Live: Crane Day</span>
          </div>
        </div>
      </nav>

      <main className="max-w-2xl mx-auto p-6 md:py-12">
        
        {view === 'welcome' && (
          <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
            <div className="text-center space-y-4">
              <div className="w-24 h-24 bg-blue-600 rounded-[32px] flex items-center justify-center mx-auto shadow-xl shadow-blue-200 rotate-3">
                <Truck size={48} className="text-white" />
              </div>
              <h1 className="text-4xl font-black tracking-tight">Welcome Home, Annie!</h1>
              <p className="text-slate-500 text-lg">Your {project.model} has officially landed. It’s time for your final walk-through.</p>
            </div>

            <div className="bg-white rounded-[32px] p-8 border border-slate-200 shadow-sm space-y-6">
              <div className="flex items-center space-x-4 p-4 bg-blue-50 rounded-2xl border border-blue-100">
                <ShieldCheck size={24} className="text-blue-600" />
                <p className="text-sm font-bold text-blue-900">
                  Yardstake is currently holding <span className="underline">${project.holdbackAmount.toLocaleString()}</span> in your managed account.
                </p>
              </div>
              
              <p className="text-sm text-slate-500 leading-relaxed">
                Before we release the final 5% to the builder, we need you to verify that everything is perfect. If you see any scuffs, dents, or missing items, we’ll add them to your <strong>Punch List</strong>.
              </p>

              <button 
                onClick={() => setView('punch-list')}
                className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-lg flex items-center justify-center space-x-3 hover:bg-slate-800 transition-all shadow-xl shadow-slate-200"
              >
                <span>Start Walk-through</span>
                <ChevronRight size={20} />
              </button>
            </div>

            <div className="grid grid-cols-2 gap-4">
               <div className="p-6 bg-white rounded-3xl border border-slate-100 text-center">
                  <div className="text-2xl mb-1">📋</div>
                  <p className="text-[10px] font-bold text-slate-400 uppercase">Step 1</p>
                  <p className="text-xs font-bold">Note Issues</p>
               </div>
               <div className="p-6 bg-white rounded-3xl border border-slate-100 text-center opacity-50">
                  <div className="text-2xl mb-1">🔑</div>
                  <p className="text-[10px] font-bold text-slate-400 uppercase">Step 2</p>
                  <p className="text-xs font-bold">Accept Keys</p>
               </div>
            </div>
          </div>
        )}

        {view === 'punch-list' && (
          <div className="space-y-6 animate-in slide-in-from-right duration-500">
            <button onClick={() => setView('welcome')} className="flex items-center text-slate-400 hover:text-slate-600 text-xs font-bold uppercase tracking-widest">
              <ArrowLeft size={14} className="mr-1" /> Back
            </button>

            <header>
              <h2 className="text-3xl font-black tracking-tight">The Punch List</h2>
              <p className="text-slate-500 text-sm mt-1">Walk through the unit. Snap photos of any defects.</p>
            </header>

            <div className="bg-white rounded-[32px] border border-slate-200 shadow-sm overflow-hidden">
              <form onSubmit={addPunchListItem} className="p-6 border-b border-slate-100 bg-slate-50/50">
                <div className="flex gap-2">
                  <input 
                    name="item"
                    type="text" 
                    placeholder="e.g. Scuff on kitchen wall"
                    required
                    className="flex-grow bg-white border border-slate-200 rounded-xl px-4 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-100 focus:border-blue-500 transition-all"
                  />
                  <button type="button" className="p-3 bg-white border border-slate-200 rounded-xl text-slate-400 hover:text-blue-600 transition-colors">
                    <Camera size={20} />
                  </button>
                  <button type="submit" className="px-6 bg-blue-600 text-white rounded-xl font-bold text-sm hover:bg-blue-700 transition-colors">
                    Add
                  </button>
                </div>
              </form>

              <div className="p-6 min-h-[300px]">
                {punchListItems.length === 0 ? (
                  <div className="flex flex-col items-center justify-center py-12 text-center space-y-4 opacity-40">
                    <Package size={48} className="text-slate-300" />
                    <p className="text-sm font-medium text-slate-500 max-w-[200px]">Everything look good? If so, you can skip to final sign-off.</p>
                  </div>
                ) : (
                  <div className="space-y-3">
                    {punchListItems.map((item) => (
                      <div key={item.id} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100 group">
                        <div className="flex items-center space-x-4">
                          <img src={item.photo} className="w-12 h-12 rounded-lg object-cover border border-slate-200" alt="Defect" />
                          <span className="font-bold text-slate-800">{item.title}</span>
                        </div>
                        <button 
                          onClick={() => setPunchListItems(punchListItems.filter(i => i.id !== item.id))}
                          className="p-1 text-slate-300 hover:text-red-500 transition-colors"
                        >
                          <X size={16} />
                        </button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-3">
              <button 
                onClick={() => setView('final-signoff')}
                className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-lg shadow-xl"
              >
                {punchListItems.length > 0 ? 'Submit Punch List' : 'Accept Home as Perfect'}
              </button>
              <p className="text-center text-[10px] text-slate-400 uppercase font-bold tracking-widest italic">
                {punchListItems.length > 0 
                  ? `${project.holdbackAmount.toLocaleString()} will remain locked until items are fixed.`
                  : `This will release the final $${project.holdbackAmount.toLocaleString()} immediately.`}
              </p>
            </div>
          </div>
        )}

        {view === 'final-signoff' && (
          <div className="space-y-8 animate-in zoom-in duration-300">
            <div className="bg-slate-900 text-white rounded-[40px] p-10 shadow-2xl relative overflow-hidden">
              <div className="absolute top-0 right-0 w-64 h-64 bg-blue-500/10 rounded-full blur-3xl -mr-20 -mt-20"></div>
              
              <div className="relative z-10 space-y-6">
                <div className="flex items-center space-x-3 mb-2 text-blue-400">
                   <FileText size={20} />
                   <span className="text-xs font-black uppercase tracking-[0.2em]">Final Certification</span>
                </div>
                <h2 className="text-3xl font-black italic tracking-tight">Final Disbursement Authorization</h2>
                
                <div className="py-6 border-y border-white/10 space-y-4 text-sm">
                  <div className="flex justify-between">
                    <span className="text-slate-400">Project:</span>
                    <span className="font-bold">#{project.id}: {project.model}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">Final Disbursement:</span>
                    <span className="font-black text-blue-400">${project.holdbackAmount.toLocaleString()}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-400">Punch List Items:</span>
                    <span className="font-bold">{punchListItems.length} Identified</span>
                  </div>
                </div>

                <div className="bg-white/5 p-5 rounded-2xl border border-white/10">
                   <p className="text-xs text-slate-400 leading-relaxed italic">
                    "I hereby authorize Yardstake to process the final payment. I acknowledge that once this transfer is initiated, the builder's legal debt to me is extinguished under the Agent of the Payee framework."
                   </p>
                </div>

                <button 
                  onClick={handleFinalSubmit}
                  disabled={isSubmitting}
                  className="w-full py-5 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-black text-xl shadow-xl shadow-blue-900/40 transition-all active:scale-95 flex items-center justify-center space-x-3"
                >
                  {isSubmitting ? (
                    <div className="animate-spin rounded-full h-6 w-6 border-2 border-white border-t-transparent" />
                  ) : (
                    <>
                      <CheckCircle2 size={24} />
                      <span>{punchListItems.length > 0 ? 'File & Finish' : 'Authorize & Finish'}</span>
                    </>
                  )}
                </button>

                <button 
                  onClick={() => setView('punch-list')}
                  className="w-full text-slate-500 hover:text-white text-xs font-bold uppercase transition-colors"
                >
                  Edit Punch List
                </button>
              </div>
            </div>
          </div>
        )}

        {view === 'success' && (
          <div className="text-center space-y-8 animate-in zoom-in duration-500 py-12">
            <div className="w-32 h-32 bg-green-500 rounded-full flex items-center justify-center mx-auto shadow-2xl shadow-green-200">
              <Star size={64} className="text-white fill-white" />
            </div>
            <div className="space-y-2">
              <h2 className="text-4xl font-black tracking-tight text-slate-900">You're All Set!</h2>
              <p className="text-slate-500 text-lg">Project #102 is officially complete.</p>
            </div>

            <div className="bg-white p-8 rounded-[40px] border border-slate-200 shadow-sm max-w-sm mx-auto space-y-6">
              <div className="flex items-center justify-center space-x-2 text-green-600 bg-green-50 w-fit px-4 py-1 rounded-full text-xs font-black uppercase mx-auto">
                <CheckCircle2 size={14} />
                <span>Debt Extinguished</span>
              </div>
              <p className="text-sm text-slate-500 leading-relaxed">
                The final {project.holdbackAmount > 0 ? 'holdback' : 'funds'} have been released to the builder. 
                Your digital audit trail and warranty documents are now available in your vault.
              </p>
              <button className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold flex items-center justify-center space-x-2">
                <Key size={18} className="text-yellow-400" />
                <span>Access Digital Vault</span>
              </button>
            </div>

            <p className="text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Extreme Makeover: Home Edition Level Success</p>
          </div>
        )}

      </main>

      {/* Footer Support */}
      <div className="fixed bottom-8 right-8 group">
         <div className="absolute bottom-full right-0 mb-4 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
            <div className="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-xl whitespace-nowrap mb-2">
               Fixer Fiona is on-site (Virtual)
            </div>
         </div>
         <button className="w-14 h-14 bg-white border border-slate-200 rounded-full shadow-2xl flex items-center justify-center hover:bg-slate-50 transition-colors">
            <div className="w-3 h-3 bg-green-500 rounded-full absolute top-0 right-0 border-2 border-white"></div>
            <Star size={24} className="text-blue-600" />
         </button>
      </div>
    </div>
  );
};

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
