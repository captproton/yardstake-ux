<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Request – Yardstake</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // Inline SVG icon components (Lucide-style)
    const _I = ({ size = 24, className, children }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
           viewBox="0 0 24 24" fill="none" stroke="currentColor"
           strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
           className={className}>{children}</svg>
    );
    const X            = p => <_I {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></_I>;
    const MapPin       = p => <_I {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></_I>;
    const Zap          = p => <_I {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></_I>;
    const ShieldCheck  = p => <_I {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></_I>;
    const DollarSign   = p => <_I {...p}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></_I>;
    const CheckCircle2 = p => <_I {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></_I>;
    const Info         = p => <_I {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></_I>;
    const ArrowRight   = p => <_I {...p}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></_I>;
    const Sparkles     = p => <_I {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></_I>;
    const Search       = p => <_I {...p}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></_I>;
    const Lock         = p => <_I {...p}><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></_I>;

    const App = () => {
  const [isOpen, setIsOpen] = useState(true);
  const [step, setStep] = useState(1);
  const [loading, setLoading] = useState(false);
  const [address, setAddress] = useState('');

  // Mock model data
  const model = {
    name: "The Glass Loft",
    architect: "Design Diane",
    basePrice: 185000,
    image: "https://images.unsplash.com/photo-1518780664697-55e3ad937233?auto=format&fit=crop&q=80&w=800"
  };

  const handleNextStep = () => {
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      setStep(step + 1);
    }, 1500);
  };

  if (!isOpen) return (
    <div className="min-h-screen flex items-center justify-center bg-slate-900">
      <button 
        onClick={() => setIsOpen(true)}
        className="px-8 py-4 bg-cyan-500 text-slate-900 font-bold rounded-2xl shadow-xl shadow-cyan-500/20"
      >
        Re-open Request Modal
      </button>
    </div>
  );

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-md font-sans overflow-y-auto">
      <div className="bg-white w-full max-w-2xl rounded-[40px] shadow-2xl overflow-hidden relative animate-in zoom-in duration-300">
        
        {/* Close Button */}
        <button 
          onClick={() => setIsOpen(false)}
          className="absolute top-6 right-6 p-2 bg-slate-100 rounded-full text-slate-400 hover:text-slate-900 transition-colors z-20"
        >
          <X size={20} />
        </button>

        <div className="flex flex-col md:flex-row">
          {/* Left Panel: Visual Context */}
          <div className="md:w-5/12 bg-slate-100 p-8 flex flex-col justify-between relative">
            <div className="relative z-10">
              <span className="bg-cyan-500 text-white text-[10px] font-black px-2 py-1 rounded-full uppercase tracking-widest mb-4 inline-block">
                Exclusive Design
              </span>
              <h2 className="text-2xl font-black text-slate-900 leading-tight mb-2">
                Bring {model.name} to Your Backyard
              </h2>
              <p className="text-sm text-slate-500 font-medium italic">by {model.architect}</p>
            </div>

            <div className="mt-8 rounded-3xl overflow-hidden shadow-lg border-4 border-white aspect-square relative group">
              <img src={model.image} alt={model.name} className="w-full h-full object-cover" />
              <div className="absolute inset-0 bg-gradient-to-t from-slate-900/60 to-transparent"></div>
              <div className="absolute bottom-4 left-4 text-white">
                <p className="text-[10px] font-bold uppercase opacity-80">Starting at</p>
                <p className="text-lg font-black">${model.basePrice.toLocaleString()}</p>
              </div>
            </div>

            <div className="mt-8 space-y-4 relative z-10">
              <div className="flex items-center space-x-3 text-xs text-slate-600 font-medium">
                <CheckCircle2 size={16} className="text-cyan-500" />
                <span>Verified Architect Specs</span>
              </div>
              <div className="flex items-center space-x-3 text-xs text-slate-600 font-medium">
                <CheckCircle2 size={16} className="text-cyan-500" />
                <span>Regional Builder Matching</span>
              </div>
            </div>
          </div>

          {/* Right Panel: Interactive Funnel */}
          <div className="md:w-7/12 p-8 md:p-12 relative flex flex-col min-h-[600px]">
            
            {/* Step Indicators */}
            <div className="flex items-center space-x-2 mb-10">
              {[1, 2, 3].map((s) => (
                <div 
                  key={s} 
                  className={`h-1 flex-grow rounded-full transition-all duration-500 ${
                    s <= step ? 'bg-blue-600' : 'bg-slate-100'
                  }`}
                />
              ))}
            </div>

            {step === 1 && (
              <div className="space-y-6 animate-in slide-in-from-right duration-500">
                <div className="space-y-2">
                  <h3 className="text-2xl font-black text-slate-900 tracking-tight">Where is your lot?</h3>
                  <p className="text-sm text-slate-500 leading-relaxed">
                    This design hasn't been "claimed" by a builder in your area yet. Tell us where you are, and we'll find a local factory to build it for you.
                  </p>
                </div>

                <div className="relative">
                  <MapPin className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={20} />
                  <input 
                    type="text"
                    placeholder="Enter your property address"
                    value={address}
                    onChange={(e) => setAddress(e.target.value)}
                    className="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-100 focus:border-blue-500 transition-all font-medium"
                  />
                </div>

                <div className="p-5 bg-blue-50 rounded-2xl border border-blue-100 flex items-start space-x-4">
                  <Sparkles className="text-blue-600 shrink-0 mt-1" size={20} />
                  <p className="text-xs text-blue-700 leading-relaxed">
                    <strong>Zero-Cost Search:</strong> We use your location to run a background scan of local zoning laws and factory availability.
                  </p>
                </div>

                <button 
                  disabled={!address || loading}
                  onClick={handleNextStep}
                  className={`w-full py-5 rounded-2xl font-black text-lg flex items-center justify-center space-x-3 transition-all ${
                    address && !loading
                    ? 'bg-blue-600 text-white shadow-xl shadow-blue-200 hover:bg-blue-700'
                    : 'bg-slate-100 text-slate-300 cursor-not-allowed'
                  }`}
                >
                  {loading ? (
                    <div className="animate-spin rounded-full h-6 w-6 border-2 border-white border-t-transparent" />
                  ) : (
                    <>
                      <span>Check Local Availability</span>
                      <ArrowRight size={20} />
                    </>
                  )}
                </button>
              </div>
            )}

            {step === 2 && (
              <div className="space-y-6 animate-in slide-in-from-right duration-500">
                <div className="space-y-2">
                  <div className="flex items-center space-x-2 text-green-600 bg-green-50 w-fit px-3 py-1 rounded-full text-[10px] font-black uppercase mb-2">
                    <ShieldCheck size={12} />
                    <span>Zoning Match Confirmed</span>
                  </div>
                  <h3 className="text-2xl font-black text-slate-900 tracking-tight">Build Intent</h3>
                  <p className="text-sm text-slate-500 leading-relaxed">
                    Great news! Your lot in San Mateo is eligible. We've identified 3 modular factories in Northern California that can manufacture this design.
                  </p>
                </div>

                <div className="space-y-4">
                  <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest">How do you plan to pay?</label>
                  <div className="grid grid-cols-2 gap-3">
                    <button className="p-4 border-2 border-blue-600 bg-blue-50 rounded-2xl flex flex-col items-center justify-center space-y-2 text-blue-600">
                      <DollarSign size={20} />
                      <span className="text-xs font-bold">Financing</span>
                    </button>
                    <button className="p-4 border-2 border-slate-100 bg-white rounded-2xl flex flex-col items-center justify-center space-y-2 text-slate-400 hover:border-slate-200 hover:text-slate-600 transition-all">
                      <DollarSign size={20} />
                      <span className="text-xs font-bold">Cash / Wire</span>
                    </button>
                  </div>
                </div>

                <div className="p-5 bg-slate-900 rounded-2xl text-white">
                  <div className="flex justify-between items-center mb-2">
                    <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">GTV Opportunity</span>
                    <span className="text-xs text-cyan-400 font-bold">Market Priority: High</span>
                  </div>
                  <p className="text-xl font-black italic">Active Buyer Bounty: $185,000</p>
                  <p className="text-[10px] text-slate-500 mt-2 uppercase">Your intent signals local builders to adopt this design.</p>
                </div>

                <button 
                  onClick={handleNextStep}
                  className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-lg shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all flex items-center justify-center space-x-3"
                >
                  <span>Finalize Request</span>
                  <ArrowRight size={20} />
                </button>
              </div>
            )}

            {step === 3 && (
              <div className="space-y-6 text-center animate-in zoom-in duration-500 flex flex-col items-center justify-center flex-grow py-10">
                <div className="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center shadow-2xl shadow-green-500/30 mb-6">
                  <CheckCircle2 size={40} className="text-white" />
                </div>
                <h3 className="text-3xl font-black text-slate-900 tracking-tight italic">Request Live!</h3>
                <p className="text-slate-500 leading-relaxed max-w-sm">
                  We've notified 3 local factories about your request. They have 24 hours to "Claim" the design and provide your final quote.
                </p>
                
                <div className="mt-10 p-6 bg-slate-50 rounded-3xl border border-slate-100 w-full">
                  <div className="flex items-center justify-between text-xs font-bold text-slate-400 uppercase mb-4">
                    <span>What happens next?</span>
                    <Info size={14} />
                  </div>
                  <ul className="text-left space-y-4">
                    <li className="flex items-start space-x-3">
                      <div className="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-[10px] font-black shrink-0">1</div>
                      <p className="text-xs text-slate-600 font-medium leading-relaxed"><strong>Fiona</strong> (Your Concierge) reaches out to verify your site access.</p>
                    </li>
                    <li className="flex items-start space-x-3">
                      <div className="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-[10px] font-black shrink-0">2</div>
                      <p className="text-xs text-slate-600 font-medium leading-relaxed">You receive a formal **Tri-Party Agreement** to lock your price.</p>
                    </li>
                  </ul>
                </div>

                <button 
                  onClick={() => setIsOpen(false)}
                  className="w-full py-5 mt-6 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800 transition-all"
                >
                  Return to Catalog
                </button>
              </div>
            )}

            {/* Platform Trust Footer */}
            <div className="mt-auto pt-8 flex items-center justify-center space-x-6 opacity-40">
              <div className="flex items-center space-x-2 grayscale">
                <Lock size={12} />
                <span className="text-[10px] font-bold uppercase tracking-widest">Bank-Level Encryption</span>
              </div>
              <div className="flex items-center space-x-2 grayscale">
                <ShieldCheck size={12} />
                <span className="text-[10px] font-bold uppercase tracking-widest">Licensed & Insured</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
