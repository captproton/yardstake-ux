<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logistics Command Center – Yardstake</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- App Template -->
  <script type="text/x-template" id="app-tpl">
    <div class="min-h-screen bg-slate-950 text-slate-100 font-sans flex flex-col md:flex-row overflow-hidden">

      <!-- Sidebar -->
      <aside class="w-full md:w-72 bg-slate-900 border-r border-slate-800 flex flex-col p-6 space-y-8 z-20">
        <div class="flex items-center space-x-3 px-2">
          <div class="bg-amber-500 p-2 rounded-xl text-slate-950 shadow-lg shadow-amber-500/20">
            <i-truck :size="24" :stroke-width="2.5" />
          </div>
          <div>
            <span class="text-xl font-bold tracking-tight text-white block leading-none">Logistics</span>
            <span class="text-[10px] font-black uppercase tracking-[0.2em] text-amber-500">Hub / Yardstake</span>
          </div>
        </div>

        <nav class="flex-grow space-y-2">
          <button
            v-for="item in navItems"
            :key="item.id"
            @click="activeTab = item.id"
            class="w-full flex items-center justify-between px-4 py-3.5 rounded-2xl transition-all duration-200 group"
            :class="activeTab === item.id
              ? 'bg-amber-500 text-slate-950 shadow-xl shadow-amber-500/10'
              : 'text-slate-400 hover:bg-slate-800 hover:text-white'"
          >
            <div class="flex items-center space-x-3">
              <component :is="item.icon" :size="18" :stroke-width="activeTab === item.id ? 2.5 : 2" />
              <span class="text-sm font-bold" :class="activeTab === item.id ? 'opacity-100' : 'opacity-80'">
                {{ item.label }}
              </span>
            </div>
            <span
              v-if="item.count"
              class="text-[10px] font-black px-2 py-0.5 rounded-lg"
              :class="activeTab === item.id ? 'bg-slate-950 text-white' : 'bg-slate-800 text-slate-400 group-hover:bg-slate-700'"
            >{{ item.count }}</span>
          </button>
        </nav>

        <div class="p-5 bg-slate-800/40 rounded-3xl border border-slate-700/50">
          <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Network Status</p>
          <div class="space-y-3">
            <div class="flex items-center space-x-2 text-green-400">
              <div class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></div>
              <span class="text-xs font-bold uppercase tracking-tight">State DOT API: Connected</span>
            </div>
            <div class="flex items-center space-x-2 text-slate-400">
              <div class="w-1.5 h-1.5 rounded-full bg-slate-600"></div>
              <span class="text-xs font-bold uppercase tracking-tight">GPS Mesh: Active</span>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main Content Area -->
      <main class="flex-grow p-6 lg:p-12 overflow-y-auto relative bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-slate-950">

        <!-- Background Accent -->
        <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-amber-500/5 blur-[120px] rounded-full pointer-events-none -mr-48 -mt-48"></div>

        <header class="flex flex-col md:flex-row md:items-end justify-between mb-12 space-y-6 md:space-y-0 relative z-10">
          <div>
            <div class="flex items-center space-x-2 text-amber-500 mb-3 bg-amber-500/10 w-fit px-3 py-1 rounded-full border border-amber-500/20">
              <i-alert-circle :size="14" />
              <span class="text-[10px] font-black uppercase tracking-[0.2em]">60% Logistics Gate</span>
            </div>
            <h1 class="text-4xl lg:text-5xl font-black tracking-tight text-white leading-tight">
              Clearance <span class="italic text-slate-500">Queue</span>
            </h1>
            <p class="text-slate-400 mt-3 max-w-xl text-lg leading-relaxed">
              Verify wide-load permits and escort bookings to unlock final production tranches and authorize shipment.
            </p>
          </div>

          <div class="relative group w-full md:w-72">
            <div class="absolute inset-0 bg-amber-500/10 rounded-2xl blur group-focus-within:bg-amber-500/20 transition-all"></div>
            <div class="relative bg-slate-900 border border-slate-700 rounded-2xl flex items-center px-4 py-3 group-focus-within:border-amber-500/50 transition-all">
              <i-search class="text-slate-500 group-focus-within:text-amber-500 transition-colors" :size="20" />
              <input
                type="text"
                placeholder="Search Project ID..."
                class="bg-transparent border-none w-full ml-3 text-sm text-white focus:outline-none placeholder-slate-600"
              />
            </div>
          </div>
        </header>

        <div class="space-y-8 relative z-10">

          <!-- Action Required: Shipment 1 -->
          <div class="bg-slate-900/80 backdrop-blur-sm rounded-[40px] border border-amber-500/40 p-8 lg:p-10 shadow-[0_20px_50px_-12px_rgba(0,0,0,0.5)]">
            <div class="flex flex-col lg:flex-row gap-12">
              <div class="flex-grow space-y-8">
                <div class="flex flex-wrap items-center gap-4">
                  <div class="bg-amber-500 text-slate-950 px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-widest animate-pulse shadow-lg shadow-amber-500/20">
                    Action Required
                  </div>
                  <span class="text-slate-500 font-mono text-sm tracking-widest">{{ shipments[0].id }}</span>
                </div>

                <div>
                  <h2 class="text-3xl lg:text-4xl font-black text-white">{{ shipments[0].project }}</h2>
                  <p class="text-slate-400 mt-2 text-lg font-medium flex items-center">
                    <i-map-pin :size="18" class="mr-2 text-amber-500" />
                    Origin: {{ shipments[0].factory }}
                  </p>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                  <div class="bg-slate-950/50 p-5 rounded-3xl border border-slate-800 group hover:border-amber-500/30 transition-all">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 flex items-center">
                      <i-clock :size="12" class="mr-1" /> Factory Status
                    </p>
                    <p class="text-sm font-bold text-amber-500">{{ shipments[0].factoryProgress }}</p>
                  </div>
                  <div class="bg-slate-950/50 p-5 rounded-3xl border border-slate-800 group hover:border-amber-500/30 transition-all">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 flex items-center">
                      <i-calendar :size="12" class="mr-1" /> Target Crane Day
                    </p>
                    <p class="text-sm font-bold text-white uppercase tracking-tighter">{{ shipments[0].craneDay }}</p>
                  </div>
                  <div class="bg-slate-950/50 p-5 rounded-3xl border border-slate-800 lg:col-span-2 group hover:border-amber-500/30 transition-all">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 flex items-center">
                      <i-shield-alert :size="12" class="mr-1" /> Route Risk Flags
                    </p>
                    <div class="flex flex-wrap gap-2">
                      <span
                        v-for="flag in shipments[0].flags"
                        :key="flag"
                        class="bg-red-500/10 text-red-400 border border-red-500/20 px-3 py-1 rounded-xl text-[10px] font-black uppercase tracking-tight"
                      >{{ flag }}</span>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Logistics Gate Upload Panel -->
              <div class="w-full lg:w-96 bg-slate-950 rounded-[32px] p-8 border border-slate-800 flex flex-col shadow-2xl">
                <h3 class="text-md font-bold text-white mb-6 flex items-center">
                  <i-file-text :size="18" class="mr-2 text-amber-500" />
                  Required Documents
                </h3>

                <div class="space-y-4 mb-8">
                  <label class="flex items-center justify-between p-4 bg-slate-900 rounded-2xl border border-slate-700 cursor-pointer hover:border-amber-500/50 hover:bg-slate-800 transition-all group">
                    <div class="flex items-center space-x-3">
                      <div class="p-2 bg-slate-800 rounded-lg group-hover:bg-amber-500/10">
                        <i-file-check :size="18" class="text-slate-500 group-hover:text-amber-500" />
                      </div>
                      <span class="text-xs font-bold text-slate-400 group-hover:text-white">DOT Route Survey</span>
                    </div>
                    <i-upload :size="16" class="text-slate-600 group-hover:text-amber-500" />
                  </label>

                  <label class="flex items-center justify-between p-4 bg-slate-900 rounded-2xl border border-slate-700 cursor-pointer hover:border-amber-500/50 hover:bg-slate-800 transition-all group">
                    <div class="flex items-center space-x-3">
                      <div class="p-2 bg-slate-800 rounded-lg group-hover:bg-amber-500/10">
                        <i-navigation :size="18" class="text-slate-500 group-hover:text-amber-500" />
                      </div>
                      <span class="text-xs font-bold text-slate-400 group-hover:text-white">Pilot Car Booking</span>
                    </div>
                    <i-upload :size="16" class="text-slate-600 group-hover:text-amber-500" />
                  </label>
                </div>

                <button class="w-full py-5 bg-slate-800 text-slate-500 rounded-2xl font-black text-xs uppercase tracking-[0.2em] border border-slate-700 cursor-not-allowed transition-all">
                  Unlock 'Ready to Ship'
                </button>
                <p class="text-[9px] text-slate-600 text-center mt-4 uppercase font-bold tracking-widest">
                  Lien Waiver #9421 auto-generated upon unlock
                </p>
              </div>
            </div>
          </div>

          <!-- Cleared Section Divider -->
          <div class="flex items-center space-x-4 py-4">
            <div class="h-px bg-slate-800 flex-grow"></div>
            <span class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]">Cleared for Dispatch</span>
            <div class="h-px bg-slate-800 flex-grow"></div>
          </div>

          <!-- Cleared Shipment: Shipment 2 -->
          <div class="bg-slate-900/40 rounded-[32px] border border-slate-800 p-6 flex flex-col md:flex-row md:items-center justify-between gap-6 hover:bg-slate-900 hover:border-slate-700 transition-all group">
            <div class="flex items-center space-x-6">
              <div class="bg-green-500/10 p-5 rounded-[24px] border border-green-500/20 text-green-500 shadow-lg shadow-green-500/5 group-hover:scale-110 transition-transform">
                <i-check-circle2 :size="24" />
              </div>
              <div>
                <div class="flex items-center space-x-3 mb-1">
                  <span class="text-slate-500 font-mono text-xs tracking-tighter uppercase">{{ shipments[1].id }}</span>
                  <span class="bg-green-500 text-slate-950 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-tighter">Gate Cleared</span>
                </div>
                <h3 class="text-xl font-bold text-white group-hover:text-amber-500 transition-colors">{{ shipments[1].project }}</h3>
                <p class="text-xs text-slate-500 font-medium">Model: {{ shipments[1].model }}</p>
              </div>
            </div>
            <div class="flex items-center space-x-10 text-right">
              <div class="hidden md:block">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Target</p>
                <p class="text-sm font-bold text-slate-300 flex items-center">
                  <i-calendar :size="14" class="mr-1 text-slate-600" /> {{ shipments[1].craneDay }}
                </p>
              </div>
              <button class="p-4 bg-slate-800 hover:bg-amber-500 hover:text-slate-950 rounded-2xl text-white transition-all shadow-xl active:scale-95">
                <i-chevron-right :size="20" :stroke-width="3" />
              </button>
            </div>
          </div>
        </div>

        <!-- Global Logistics Advisory -->
        <div class="mt-16 p-8 bg-blue-900/10 border border-blue-500/30 rounded-[40px] flex items-start space-x-6 relative overflow-hidden group">
          <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/5 blur-3xl rounded-full"></div>
          <i-shield-alert class="text-blue-500 shrink-0 mt-1 animate-pulse" :size="28" />
          <div class="relative z-10">
            <h4 class="text-lg font-black text-blue-100 italic">"Last Mile" Site Integrity Rule</h4>
            <p class="text-sm text-blue-200/60 mt-2 leading-relaxed max-w-4xl">
              Verify the <strong>Site Survey</strong> photos from Backyard Bill before finalizing the DOT Route Permit.
              Cross-reference municipal power-line height data for the delivery cul-de-sac.
              If the lowboy trailer clearance is less than 18 inches at the site entrance, flag for specialized
              <em>articulated trailer</em> dispatch.
            </p>
            <button class="mt-4 text-[10px] font-black uppercase tracking-[0.2em] text-blue-400 hover:text-white transition-colors">
              Open Site Survey Archive &#8594;
            </button>
          </div>
        </div>

        <footer class="mt-20 py-8 border-t border-slate-800 text-center">
          <p class="text-[10px] font-black text-slate-600 uppercase tracking-[0.5em]">Yardstake Logistics Logic v2.5.4</p>
        </footer>
      </main>
    </div>
  </script>

  <script>
    const { createApp, ref } = Vue;

    // Helper: create an SVG icon component from raw path markup
    function makeIcon(paths) {
      return {
        props: { size: { default: 24 }, strokeWidth: { default: 2 } },
        template: `<svg xmlns="http://www.w3.org/2000/svg" :width="size" :height="size" viewBox="0 0 24 24" fill="none" stroke="currentColor" :stroke-width="strokeWidth" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`
      };
    }

    const IcoTruck         = makeIcon('<rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>');
    const IcoMap           = makeIcon('<polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21 3 6"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/>');
    const IcoFileCheck     = makeIcon('<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="m9 12 2 2 4-4"/>');
    const IcoAlertTriangle = makeIcon('<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/>');
    const IcoCheckCircle2  = makeIcon('<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>');
    const IcoClock         = makeIcon('<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>');
    const IcoMapPin        = makeIcon('<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>');
    const IcoSearch        = makeIcon('<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>');
    const IcoUpload        = makeIcon('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/>');
    const IcoCalendar      = makeIcon('<rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>');
    const IcoChevronRight  = makeIcon('<path d="m9 18 6-6-6-6"/>');
    const IcoShieldAlert   = makeIcon('<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="M12 8v4"/><path d="M12 16h.01"/>');
    const IcoNavigation    = makeIcon('<polygon points="3 11 22 2 13 21 11 13 3 11"/>');
    const IcoFileText      = makeIcon('<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><line x1="8" x2="16" y1="13" y2="13"/><line x1="8" x2="14" y1="17" y2="17"/>');
    const IcoAlertCircle   = makeIcon('<circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>');

    const App = {
      template: '#app-tpl',
      setup() {
        const activeTab = ref('pending');

        const navItems = [
          { id: 'pending', label: '60% Gates (Pending)', icon: 'i-alert-triangle', count: 4 },
          { id: 'cleared', label: 'Cleared to Ship',     icon: 'i-check-circle2',  count: 12 },
          { id: 'active',  label: 'Active Transit',       icon: 'i-navigation',     count: 2 },
          { id: 'map',     label: 'Live Map View',        icon: 'i-map' },
        ];

        const shipments = [
          {
            id: 'LOG-102',
            project: 'Project #102: San Mateo',
            model: 'Modern Sanctuary XL',
            factory: 'Apex Modular (Sacramento)',
            status: 'action_required',
            factoryProgress: '62% (Drywall Complete)',
            craneDay: 'Mar 12, 2026',
            distance: '114 miles',
            flags: ['14ft Wide-Load', 'Mountain Pass'],
          },
          {
            id: 'LOG-088',
            project: 'Project #88: Austin, TX',
            model: 'Studio Pod',
            factory: 'Texas Prefab (Dallas)',
            status: 'cleared',
            factoryProgress: '90% (Ready to Ship)',
            craneDay: 'Feb 28, 2026',
            distance: '195 miles',
            flags: ['Oversize'],
          },
        ];

        return { activeTab, navItems, shipments };
      },
    };

    const app = createApp(App);
    app.component('i-truck',           IcoTruck);
    app.component('i-map',             IcoMap);
    app.component('i-file-check',      IcoFileCheck);
    app.component('i-alert-triangle',  IcoAlertTriangle);
    app.component('i-check-circle2',   IcoCheckCircle2);
    app.component('i-clock',           IcoClock);
    app.component('i-map-pin',         IcoMapPin);
    app.component('i-search',          IcoSearch);
    app.component('i-upload',          IcoUpload);
    app.component('i-calendar',        IcoCalendar);
    app.component('i-chevron-right',   IcoChevronRight);
    app.component('i-shield-alert',    IcoShieldAlert);
    app.component('i-navigation',      IcoNavigation);
    app.component('i-file-text',       IcoFileText);
    app.component('i-alert-circle',    IcoAlertCircle);
    app.mount('#root');
  </script>
</body>
</html>
